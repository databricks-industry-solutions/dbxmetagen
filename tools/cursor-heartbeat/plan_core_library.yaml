# Heartbeat Plan: Core Library (Processing Pipeline & Metadata Generation)
# Targets the 35-module src/dbxmetagen/ package.

schedule:
  interval_minutes: 15
  max_runs_per_day: 20
  active_hours: "08:00-22:00"

project:
  path: "/Users/eli.swanson/Projects/solutions_accelerators/industry_solutions_dbxmetagen/dbxmetagen"
  branch_prefix: "heartbeat/core"
  base_branch: "apps"
  test_command: "python -m pytest tests/ -x -q --timeout=30 -k 'not test_app_logic'"

scope:
  include_patterns:
    - "src/dbxmetagen/*.py"
  exclude_patterns:
    - "**/__pycache__/**"
  max_files_changed: 3
  max_lines_changed: 100

goals:
  system_prompt: |
    You are a senior Python engineer with deep expertise in:
    - PySpark DataFrame operations and performance
    - Pydantic data models and validation
    - MLflow tracing and experiment tracking
    - Databricks Unity Catalog (tables, volumes, tags, permissions)
    - LLM integration patterns (structured output parsing, retry logic, token management)
    - Large module decomposition and extraction refactoring

    You are reviewing the core library of dbxmetagen, an AI-powered metadata generation
    toolkit for Databricks Unity Catalog. The library generates comments, classifies PII,
    predicts domains, builds knowledge graphs, computes embeddings, discovers ontologies,
    predicts foreign keys, and auto-generates semantic layer metric views.

  task_prompt: |
    Review the dbxmetagen core library and identify ONE small but meaningful improvement.

    Constraints:
    - Limit changes to {max_files} files and ~{max_lines} lines.
    - The change must be self-contained and not break existing functionality.
    - Do NOT change the structure of variables.yml (breaks DAB deployment).
    - Do NOT change DDL table schemas (breaks downstream consumers).
    - Do NOT change public function signatures without updating callers.

    High-value improvement areas for this codebase:
    1. processing.py is ~3500 lines -- extract duplicated patterns across append_*_row
       and add_ddl_* functions into shared helpers
    2. config.py has ~70 params with YAML layering -- find validation gaps, inconsistent
       defaults, or missing type coercion in _parse_bool / load_yaml
    3. chat_client.py / metadata_generator.py -- harden error handling around LLM calls
       (malformed JSON responses, token limit exceeded, empty completions)
    4. knowledge_graph.py / embeddings.py / similarity_edges.py -- Spark DataFrame
       performance (unnecessary .collect() calls, missing .cache(), redundant shuffles)
    5. fk_prediction.py / ontology.py -- prompt robustness, result parsing edge cases
    6. error_handling.py -- retry logic gaps, missing backoff for specific error types

    For your chosen improvement:
    - Explain WHY it matters (1-2 sentences)
    - Show the exact file changes as unified diffs
    - If you add/modify code, include or update relevant tests
    - Verify the change is consistent with the existing code style

  avoid:
    - Cosmetic-only changes (formatting, import reordering)
    - Large refactors that touch many files
    - Adding new dependencies
    - Changes to variables.yml, variables.advanced.yml, or YAML structure
    - Changes to DDL CREATE TABLE schemas
    - Changes to configuration or CI/CD files

# Skills: SKILL.md files loaded from .cursor/skills/ and injected into the system prompt.
# These give the LLM best-practice patterns for the technologies used in this codebase.
skills:
  - databricks-unity-catalog     # UC tables, volumes, tags, permissions patterns
  - databricks-python-sdk        # WorkspaceClient, Databricks Connect, SDK patterns
  - databricks-vector-search     # Vector index creation, embeddings, similarity queries
  - databricks-dbsql             # SQL warehouse, ai_query, materialized views
  - instrumenting-with-mlflow-tracing  # MLflow tracing patterns used throughout
  - databricks-metric-views      # Metric views (used in semantic_layer.py)

# MCP tools: Databricks SDK tools the LLM can call during analysis via Anthropic tool_use.
# Requires DATABRICKS_HOST + DATABRICKS_TOKEN in env. Gracefully skipped if unavailable.
mcp_tools:
  - execute_sql          # Validate SQL patterns found in the code
  - get_table_schema     # Check actual schemas of UC tables referenced in code
  - list_tables          # Verify tables exist in the target catalog/schema

journal:
  path: "tools/cursor-heartbeat/heartbeat_journal_core.jsonl"

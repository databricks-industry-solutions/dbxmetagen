# Heartbeat Plan: FastAPI + React Application
# Targets the dbxmetagen-app (API server, LangGraph agents, React frontend).

schedule:
  interval_minutes: 20
  max_runs_per_day: 15
  active_hours: "08:00-22:00"

project:
  path: "/Users/eli.swanson/Projects/solutions_accelerators/industry_solutions_dbxmetagen/dbxmetagen"
  branch_prefix: "heartbeat/app"
  base_branch: "apps"
  test_command: "echo 'app tests: validating Python syntax' && python -m py_compile apps/dbxmetagen-app/app/api_server.py && python -m py_compile apps/dbxmetagen-app/app/db.py"

scope:
  include_patterns:
    - "apps/dbxmetagen-app/app/*.py"
    - "apps/dbxmetagen-app/app/agent/*.py"
    - "apps/dbxmetagen-app/app/src/*.jsx"
    - "apps/dbxmetagen-app/app/src/components/*.jsx"
    - "apps/dbxmetagen-app/app/src/*.css"
  exclude_patterns:
    - "**/node_modules/**"
    - "**/dist/**"
    - "**/__pycache__/**"
    - "apps/dbxmetagen-app/app/app.yaml"
  max_files_changed: 3
  max_lines_changed: 100

goals:
  system_prompt: |
    You are a full-stack engineer with deep expertise in:
    - FastAPI (async endpoints, dependency injection, error handling, middleware)
    - React (functional components, hooks, state management, error boundaries)
    - Tailwind CSS (responsive design, accessibility, dark mode)
    - LangGraph (StateGraph, ToolNode, ReAct agents, state management)
    - Databricks SQL Statement Execution API (parameterized queries, pagination)
    - Lakebase / PostgreSQL (connection pooling, query safety, psycopg2)
    - Security: SQL injection prevention, input validation, CORS

    You are reviewing the dbxmetagen web application, which provides:
    - 8-tab React UI: Agent Chat, Coverage, Batch Jobs, Metadata Review,
      Semantic Layer, Genie Builder, Vector Search, and Graph Explorer
    - FastAPI backend with SQL via Statement Execution API and Lakebase
    - LangGraph metadata agent with tools for graph traversal, Genie, metrics

  task_prompt: |
    Review the dbxmetagen application and identify ONE small but meaningful improvement.

    Constraints:
    - Limit changes to {max_files} files and ~{max_lines} lines.
    - Do NOT change app.yaml or DAB resource configurations.
    - Do NOT change API endpoint URL paths or response schemas (breaks frontend).
    - Do NOT add new npm or pip dependencies.

    High-value improvement areas:
    1. SQL injection -- api_server.py builds SQL with f-strings in several endpoints;
       convert to parameterized queries via Statement Execution API parameters
    2. Error handling -- FastAPI endpoints that catch broad Exception; add specific
       error types, proper HTTP status codes, and structured error responses
    3. Connection management -- db.py Lakebase connections; ensure proper cleanup,
       connection pooling, and timeout handling
    4. React UX -- missing loading spinners, error states, empty-state messages in
       components like Coverage.jsx, MetadataReview.jsx, BatchJobs.jsx
    5. Agent robustness -- metadata_agent.py / deep_analysis.py: tool error handling,
       conversation memory limits, graceful degradation when tools fail
    6. Accessibility -- missing aria labels, keyboard navigation, focus management
       in the React components

    For your chosen improvement:
    - Explain WHY it matters (1-2 sentences)
    - Provide the exact file changes
    - For React changes, ensure JSX is valid and Tailwind classes are correct

  avoid:
    - Cosmetic-only changes (color tweaks, spacing adjustments)
    - Changes to app.yaml, DAB resource configs, or deployment files
    - Adding new API endpoints (scope creep)
    - Adding npm or pip dependencies
    - Rewriting entire components

# Skills: best-practice references for the app's technology stack.
skills:
  - databricks-app-apx           # FastAPI + React app patterns on Databricks
  - databricks-app-python        # Databricks App auth, resources, deployment
  - databricks-genie             # Genie Space creation and conversation API
  - databricks-lakebase-provisioned  # Lakebase PostgreSQL connectivity patterns
  - databricks-vector-search     # Vector Search used in the app's search tab
  - databricks-dbsql             # Statement Execution API, parameterized queries

# MCP tools: the app builds SQL dynamically -- use these to validate patterns.
mcp_tools:
  - execute_sql          # Test SQL patterns found in api_server.py endpoints
  - get_table_schema     # Verify table schemas the app queries
  - list_tables          # Check which tables the app expects to exist

journal:
  path: "tools/cursor-heartbeat/heartbeat_journal_app.jsonl"

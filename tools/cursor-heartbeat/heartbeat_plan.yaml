# Cursor Heartbeat - Autonomous Improvement Plan
# This config drives periodic, scoped improvements to your project.

schedule:
  interval_minutes: 15
  max_runs_per_day: 20       # safety cap
  active_hours: "08:00-22:00" # only run during these hours (local time)

project:
  path: "/Users/eli.swanson/Projects/solutions_accelerators/industry_solutions_dbxmetagen/dbxmetagen"
  branch_prefix: "heartbeat"  # creates branches like heartbeat/improve-xyz
  base_branch: "apps"         # branch to diff against and branch from
  test_command: "python -m pytest tests/ -x -q --timeout=30"

scope:
  include_patterns:
    - "src/**/*.py"
    - "tests/**/*.py"
  exclude_patterns:
    - "**/node_modules/**"
    - "**/dist/**"
    - "**/__pycache__/**"
    - "*.lock"
  max_files_changed: 3
  max_lines_changed: 100

goals:
  system_prompt: |
    You are a senior engineer performing a focused code review and improvement pass.
    You have deep expertise in Python, testing, and software architecture.

  task_prompt: |
    Review this project and identify ONE small but meaningful improvement.

    Constraints:
    - Do NOT diverge from the project's main functionality and goals.
    - Limit changes to {max_files} files and ~{max_lines} lines.
    - The change must be self-contained and not break existing functionality.

    Improvement categories (pick the highest-value one):
    1. Performance: unnecessary allocations, O(n^2) patterns, caching opportunities
    2. Correctness: edge cases, error handling gaps, race conditions
    3. Testing: missing coverage for critical paths, brittle test patterns
    4. Code quality: dead code, unclear naming, duplicated logic
    5. Security: input validation, secret handling, dependency issues

    For your chosen improvement:
    - Explain WHY it matters (1-2 sentences)
    - Show the exact file changes as unified diffs
    - If you add/modify code, include or update relevant tests
    - Verify the change is consistent with the existing code style

  avoid:
    - Cosmetic-only changes (pure formatting, import reordering)
    - Large refactors that touch many files
    - Adding new dependencies without strong justification
    - Changes to configuration or CI/CD files

# Skills: SKILL.md files from .cursor/skills/ injected into the system prompt.
# Lists skill directory names. Loaded automatically if the file exists.
skills:
  - databricks-python-sdk
  - databricks-unity-catalog

# MCP tools: Databricks SDK tools the LLM can invoke during analysis via tool_use.
# Requires DATABRICKS_HOST + DATABRICKS_TOKEN in ~/.env.heartbeat.
# Gracefully disabled if credentials are unavailable.
mcp_tools:
  - execute_sql
  - get_table_schema
  - list_tables

journal:
  path: "tools/cursor-heartbeat/heartbeat_journal.jsonl"

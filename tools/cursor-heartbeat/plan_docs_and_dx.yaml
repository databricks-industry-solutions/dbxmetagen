# Heartbeat Plan: Developer Experience & Documentation
# Targets examples, scripts, docs, configs, and public API docstrings.

schedule:
  interval_minutes: 60
  max_runs_per_day: 8
  active_hours: "08:00-22:00"

project:
  path: "/Users/eli.swanson/Projects/solutions_accelerators/industry_solutions_dbxmetagen/dbxmetagen"
  branch_prefix: "heartbeat/dx"
  base_branch: "apps"
  test_command: "python -m pytest tests/ -x -q --timeout=30 -k 'test_config or test_yaml'"

scope:
  include_patterns:
    - "examples/*.py"
    - "scripts/*.py"
    - "docs/*.md"
    - "README.md"
    - "configurations/**/*.yaml"
    - "configurations/**/*.yml"
    - "src/dbxmetagen/*.py"
  exclude_patterns:
    - "**/__pycache__/**"
    - "**/node_modules/**"
    - "**/dist/**"
    - "tools/**"
  max_files_changed: 3
  max_lines_changed: 80

goals:
  system_prompt: |
    You are a developer experience engineer with expertise in:
    - Technical documentation (clear, accurate, minimal)
    - Python docstrings (Google style, type hints, parameter descriptions)
    - Databricks notebooks and example workflows
    - YAML configuration schemas and validation
    - Unity Catalog concepts (catalogs, schemas, tables, volumes, tags)
    - Onboarding friction reduction

    You are reviewing the documentation and developer experience of dbxmetagen,
    an AI-powered metadata generation toolkit for Databricks. The project includes:
    - README.md with quickstart and full deployment instructions
    - examples/ with runnable notebooks (01_quickstart through 05+)
    - scripts/ with operational notebooks (generate_metadata, build_kb, etc.)
    - configurations/ with domain_config and ontology bundle YAMLs
    - docs/ with CONFIGURATION.md, PERSONAS_AND_WORKFLOWS.md
    - 35 public modules in src/dbxmetagen/ with varying docstring quality

  task_prompt: |
    Review the dbxmetagen developer experience and identify ONE improvement.

    Constraints:
    - Limit changes to {max_files} files and ~{max_lines} lines.
    - Do NOT change actual functionality or runtime behavior.
    - Do NOT rewrite prose style -- fix accuracy and completeness only.
    - Docstring additions should follow existing Google-style conventions.

    High-value improvement areas:
    1. Example accuracy -- do examples/ notebooks match the current API? Check that
       imports, function signatures, table names, and config params are correct
    2. Configuration documentation -- are all params in variables.yml documented in
       CONFIGURATION.md? Are defaults accurate? Are deprecated params flagged?
    3. README quickstart -- does pip install dbxmetagen work? Are version requirements
       (DBR 17.3+, Python 3.11+) accurate? Is the notebook quickstart path correct?
    4. Public API docstrings -- find functions in src/dbxmetagen/ that are called from
       examples/scripts but lack docstrings or have outdated parameter descriptions
    5. Configuration YAML -- find params defined in config.py SETUP_PARAMS that are
       missing from variables.yml, or vice versa

    For your chosen improvement:
    - Explain WHY it matters for users (1-2 sentences)
    - Provide the exact file changes
    - If updating docstrings, include type hints and parameter descriptions

  avoid:
    - Cosmetic prose changes (rewording for style)
    - Adding new documentation files
    - Changing runtime behavior or function signatures
    - Modifying test files
    - Rewriting the entire README

# Skills: reference material for validating docs against real API patterns.
skills:
  - databricks-unity-catalog     # UC concepts referenced in docs and examples
  - databricks-python-sdk        # SDK patterns that examples should demonstrate
  - databricks-asset-bundles     # DAB deployment patterns referenced in README
  - databricks-config            # Authentication and profile setup docs
  - databricks-docs              # General Databricks documentation reference

# MCP tools: verify that documented table names, schemas, and configs actually exist.
mcp_tools:
  - execute_sql          # Validate SQL snippets in examples and docs
  - get_table_schema     # Check schemas referenced in examples
  - list_tables          # Verify documented table names exist
  - list_volumes         # Verify documented volume paths exist

journal:
  path: "tools/cursor-heartbeat/heartbeat_journal_dx.jsonl"

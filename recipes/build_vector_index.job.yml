resources:
  jobs:
    dbxmetagen_build_vector_index:
      name: "dbxmetagen_build_vector_index"

      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: endpoint_name
          default: "dbxmetagen-vs"

      tasks:
        - task_key: build_vector_index
          job_cluster_key: vs_cluster
          notebook_task:
            notebook_path: ${var.dbxmetagen_notebooks}/build_vector_index
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              endpoint_name: "{{job.parameters.endpoint_name}}"
          libraries:
            - whl: ${var.dbxmetagen_wheel}

      job_clusters:
        - job_cluster_key: vs_cluster
          new_cluster:
            spark_version: 17.3.x-cpu-ml-scala2.13
            node_type_id: ${var.node_type}
            num_workers: 1

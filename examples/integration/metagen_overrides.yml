# dbxmetagen configuration overrides.
#
# This file is loaded by MetadataConfig via yaml_file_path in 01_generate_metadata.py.
# Only include values that DIFFER from dbxmetagen's built-in defaults.
# For the full parameter list, see: variables.yml in the dbxmetagen repo root.
#
# MetadataConfig resolution order (last wins):
#   1. variables.yml defaults (shipped with dbxmetagen)
#   2. This overrides file (via yaml_file_path kwarg)
#   3. Explicit kwargs passed to main({...})

variables:
  # --- Output location ---
  schema_name:
    description: Schema where dbxmetagen writes its output tables.
    default: default
  volume_name:
    description: UC Volume for DDL and export artifacts.
    default: generated_metadata

  # --- Generation behavior ---
  model:
    description: LLM endpoint for metadata generation.
    default: databricks-claude-sonnet-4-6
  mode:
    description: "Generation mode: comment, pi, or domain."
    default: comment
  apply_ddl:
    description: Do not ALTER source tables directly.
    default: false
  incremental:
    description: Skip tables already processed in a previous run.
    default: true

  # --- Ontology / domain ---
  ontology_bundle:
    description: "Built-in ontology bundle (general, healthcare, financial_services, retail_cpg)."
    default: general

  # --- Uncomment to customize further ---
  # sample_size:
  #   default: 5
  # columns_per_call:
  #   default: 20
  # temperature:
  #   default: 0.1
  # include_lineage:
  #   default: true

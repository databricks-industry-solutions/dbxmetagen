# DAB resolves env vars from resources/apps/dbxmetagen_app.yml at deploy time.
# These values serve as runtime defaults for the Apps runtime.
command:
  - uvicorn
  - api_server:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: CATALOG_NAME
    value: "eswanson_demo"
  - name: SCHEMA_NAME
    value: "metadata_results"
  - name: WAREHOUSE_ID
    valueFrom: sql_warehouse
  - name: GRAPHRAG_MODEL
    value: "databricks-claude-sonnet-4-5"

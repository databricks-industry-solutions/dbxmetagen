resources:
  jobs:
    fk_prediction_job:
      name: "${var.app_name}_fk_prediction"
      budget_policy_id: ${var.budget_policy_id}

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: column_similarity_threshold
          default: "0.85"
        - name: table_similarity_threshold
          default: "0.9"
        - name: duplicate_table_similarity_threshold
          default: "0.97"
        - name: cross_block_column_similarity_min
          default: "0.92"
        - name: cross_block_strict
          default: "true"
        - name: ontology_cross_block
          default: "false"
        - name: skip_ai_for_declared_fk
          default: "false"
        - name: skip_ai_query_min_observations
          default: "0"
        - name: confidence_threshold
          default: "0.7"
        - name: sample_size
          default: "50"
        - name: apply_ddl
          default: "false"
        - name: dry_run
          default: "false"
        - name: incremental
          default: "true"
        - name: table_names
          default: ""

      tasks:
        - task_key: predict_foreign_keys
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/predict_foreign_keys.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              column_similarity_threshold: "{{job.parameters.column_similarity_threshold}}"
              table_similarity_threshold: "{{job.parameters.table_similarity_threshold}}"
              duplicate_table_similarity_threshold: "{{job.parameters.duplicate_table_similarity_threshold}}"
              cross_block_column_similarity_min: "{{job.parameters.cross_block_column_similarity_min}}"
              cross_block_strict: "{{job.parameters.cross_block_strict}}"
              ontology_cross_block: "{{job.parameters.ontology_cross_block}}"
              skip_ai_for_declared_fk: "{{job.parameters.skip_ai_for_declared_fk}}"
              skip_ai_query_min_observations: "{{job.parameters.skip_ai_query_min_observations}}"
              confidence_threshold: "{{job.parameters.confidence_threshold}}"
              sample_size: "{{job.parameters.sample_size}}"
              apply_ddl: "{{job.parameters.apply_ddl}}"
              dry_run: "{{job.parameters.dry_run}}"
              incremental: "{{job.parameters.incremental}}"
              table_names: "{{job.parameters.table_names}}"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ../../dist/*.whl

resources:
  jobs:
    full_analytics_pipeline_serverless_job:
      name: "${var.app_name}_full_analytics_pipeline_serverless"
      budget_policy_id: ${var.budget_policy_id}

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: similarity_threshold
          default: "0.85"
        - name: max_edges_per_node
          default: "10"
        - name: use_ann_similarity
          default: "true"
        - name: generate_comments
          default: "true"
        - name: cluster_min_k
          default: "2"
        - name: cluster_max_k
          default: "15"
        - name: cluster_node_types
          default: "table"
        - name: ontology_bundle
          default: ${var.ontology_bundle}
        - name: domain_config_path
          default: ""
        - name: incremental
          default: ${var.incremental}
        - name: model
          default: ${var.model}
        - name: table_names
          default: ""
        - name: max_ai_candidates
          default: ${var.max_ai_candidates}
        - name: rule_score_min_for_ai
          default: ${var.rule_score_min_for_ai}
        - name: max_candidates_per_table_pair
          default: ${var.max_candidates_per_table_pair}
        - name: apply_ddl
          default: "false"
        - name: sweep_stale_edges
          default: "false"
        - name: sweep_stale_docs
          default: "false"
        - name: endpoint_name
          default: "dbxmetagen-vs"

      tasks:
        - task_key: build_knowledge_base
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/build_knowledge_base.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              table_names: "{{job.parameters.table_names}}"

        - task_key: build_column_kb
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/build_column_kb.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              table_names: "{{job.parameters.table_names}}"

        - task_key: build_schema_kb
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: build_knowledge_base
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/build_schema_kb.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              generate_comments: "{{job.parameters.generate_comments}}"
              table_names: "{{job.parameters.table_names}}"
              incremental: "{{job.parameters.incremental}}"

        - task_key: extract_extended_metadata
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: build_knowledge_base
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/extract_extended_metadata.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              incremental: "{{job.parameters.incremental}}"
              table_names: "{{job.parameters.table_names}}"

        - task_key: build_knowledge_graph
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: build_column_kb
            - task_key: build_schema_kb
            - task_key: extract_extended_metadata
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/build_knowledge_graph.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              table_names: "{{job.parameters.table_names}}"
              sweep_stale_edges: "{{job.parameters.sweep_stale_edges}}"
              incremental: "{{job.parameters.incremental}}"

        - task_key: generate_embeddings
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: build_knowledge_graph
            - task_key: build_ontology
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/generate_embeddings.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              table_names: "{{job.parameters.table_names}}"

        - task_key: run_profiling
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: build_knowledge_base
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/run_profiling.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              incremental: "{{job.parameters.incremental}}"
              table_names: "{{job.parameters.table_names}}"

        - task_key: build_ontology_vector_index
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: build_knowledge_base
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/build_ontology_vector_index.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              ontology_bundle: "{{job.parameters.ontology_bundle}}"
              endpoint_name: "{{job.parameters.endpoint_name}}"

        - task_key: build_ontology
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          depends_on:
            - task_key: build_knowledge_base
            - task_key: build_column_kb
            - task_key: build_ontology_vector_index
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/build_ontology.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              ontology_bundle: "{{job.parameters.ontology_bundle}}"
              domain_config_path: "{{job.parameters.domain_config_path}}"
              incremental: "{{job.parameters.incremental}}"
              model: "{{job.parameters.model}}"
              table_names: "{{job.parameters.table_names}}"
              apply_ddl: "{{job.parameters.apply_ddl}}"

        - task_key: build_similarity_edges
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: generate_embeddings
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/build_similarity_edges.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              similarity_threshold: "{{job.parameters.similarity_threshold}}"
              max_edges_per_node: "{{job.parameters.max_edges_per_node}}"
              use_ann_similarity: "{{job.parameters.use_ann_similarity}}"
              sweep_stale_edges: "{{job.parameters.sweep_stale_edges}}"
              table_names: "{{job.parameters.table_names}}"
              incremental: "{{job.parameters.incremental}}"

        - task_key: cluster_analysis
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: generate_embeddings
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/cluster_analysis.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              min_k: "{{job.parameters.cluster_min_k}}"
              max_k: "{{job.parameters.cluster_max_k}}"
              node_types: "{{job.parameters.cluster_node_types}}"
              table_names: "{{job.parameters.table_names}}"
              incremental: "{{job.parameters.incremental}}"

        - task_key: compute_data_quality
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: run_profiling
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/compute_data_quality.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              table_names: "{{job.parameters.table_names}}"
              incremental: "{{job.parameters.incremental}}"

        - task_key: validate_ontology
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: build_ontology
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/validate_ontology.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              table_names: "{{job.parameters.table_names}}"

        - task_key: predict_foreign_keys
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          depends_on:
            - task_key: build_similarity_edges
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/predict_foreign_keys.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              column_similarity_threshold: "0.75"
              table_similarity_threshold: "0.7"
              confidence_threshold: "0.7"
              apply_ddl: "{{job.parameters.apply_ddl}}"
              dry_run: "false"
              incremental: "{{job.parameters.incremental}}"
              max_ai_candidates: "{{job.parameters.max_ai_candidates}}"
              rule_score_min_for_ai: "{{job.parameters.rule_score_min_for_ai}}"
              max_candidates_per_table_pair: "{{job.parameters.max_candidates_per_table_pair}}"
              sweep_stale_edges: "{{job.parameters.sweep_stale_edges}}"
              table_names: "{{job.parameters.table_names}}"

        - task_key: refresh_ontology_edges
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          depends_on:
            - task_key: predict_foreign_keys
            - task_key: build_ontology
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/refresh_ontology_edges.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              ontology_bundle: "{{job.parameters.ontology_bundle}}"
              model: "{{job.parameters.model}}"
              table_names: "{{job.parameters.table_names}}"
              sweep_stale_edges: "{{job.parameters.sweep_stale_edges}}"
              incremental: "{{job.parameters.incremental}}"

        - task_key: final_analysis
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: refresh_ontology_edges
            - task_key: cluster_analysis
            - task_key: compute_data_quality
            - task_key: validate_ontology
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/final_analysis.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"

        - task_key: build_community_summaries
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          depends_on:
            - task_key: final_analysis
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/build_community_summaries.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              model: "{{job.parameters.model}}"
              table_names: "{{job.parameters.table_names}}"
              incremental: "{{job.parameters.incremental}}"

        - task_key: build_vector_index
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: final_analysis
            - task_key: build_community_summaries
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/build_vector_index.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              endpoint_name: "{{job.parameters.endpoint_name}}"
              sweep_stale_docs: "{{job.parameters.sweep_stale_docs}}"
              table_names: "{{job.parameters.table_names}}"
              incremental: "{{job.parameters.incremental}}"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ../../dist/*.whl

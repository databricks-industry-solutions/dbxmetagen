resources:
  jobs:
    enriched_first_pipeline_job:
      name: "${var.app_name}_enriched_first_pipeline"
      max_concurrent_runs: 5

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      parameters:
        - name: table_names
          default: ${var.job_table_names}
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: current_user
          default: ${var.current_user}
        - name: permission_groups
          default: ${var.permission_groups}
        - name: permission_users
          default: ${var.permission_users}
        - name: run_id
          default: "{{job.run_id}}"
        - name: similarity_threshold
          default: "0.85"
        - name: max_edges_per_node
          default: "10"
        - name: use_ann_similarity
          default: "true"
        - name: cluster_min_k
          default: "2"
        - name: cluster_max_k
          default: "15"
        - name: cluster_node_types
          default: "table"
        - name: ontology_bundle
          default: "healthcare"
        - name: domain_config_path
          default: ""
        - name: incremental
          default: ${var.incremental}
        - name: include_previously_failed_tables
          default: "false"
        - name: include_profiling_context
          default: "true"
        - name: include_constraint_context
          default: "true"
        - name: model
          default: ${var.model}
        - name: spacy_model_names
          default: ${var.spacy_model_names}

      tasks:
        # ------------------------------------------------------------------
        # Stage 0: Bootstrap KB tables from information_schema (fast, no LLM)
        # ------------------------------------------------------------------
        - task_key: bootstrap_knowledge_bases
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/bootstrap_knowledge_bases.py
            base_parameters:
              table_names: "{{job.parameters.table_names}}"
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
          libraries:
            - whl: ../../dist/*.whl

        # ------------------------------------------------------------------
        # Stage 1: Profiling, extended metadata, ontology (parallel, after bootstrap)
        # ------------------------------------------------------------------
        - task_key: run_profiling
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: bootstrap_knowledge_bases
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/run_profiling.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              incremental: "{{job.parameters.incremental}}"
          libraries:
            - whl: ../../dist/*.whl

        - task_key: extract_extended_metadata
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: bootstrap_knowledge_bases
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/extract_extended_metadata.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              incremental: "{{job.parameters.incremental}}"
          libraries:
            - whl: ../../dist/*.whl

        - task_key: build_ontology
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          depends_on:
            - task_key: bootstrap_knowledge_bases
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/build_ontology.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              ontology_bundle: "{{job.parameters.ontology_bundle}}"
              domain_config_path: "{{job.parameters.domain_config_path}}"
              incremental: "{{job.parameters.incremental}}"
              model: "{{job.parameters.model}}"
          libraries:
            - whl: ../../dist/*.whl

        # ------------------------------------------------------------------
        # Stage 2: Generate comments/PI/domain (enriched by profiling + constraints)
        # ------------------------------------------------------------------
        - task_key: generate_comments
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          depends_on:
            - task_key: run_profiling
            - task_key: extract_extended_metadata
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/generate_metadata.py
            base_parameters:
              mode: "comment"
              table_names: "{{job.parameters.table_names}}"
              catalog_name: "{{job.parameters.catalog_name}}"
              current_user: "{{job.parameters.current_user}}"
              permission_groups: "{{job.parameters.permission_groups}}"
              permission_users: "{{job.parameters.permission_users}}"
              run_id: "{{job.parameters.run_id}}"
              include_previously_failed_tables: "{{job.parameters.include_previously_failed_tables}}"
              include_profiling_context: "{{job.parameters.include_profiling_context}}"
              include_constraint_context: "{{job.parameters.include_constraint_context}}"
              ontology_bundle: "{{job.parameters.ontology_bundle}}"
              domain_config_path: "{{job.parameters.domain_config_path}}"
              model: "{{job.parameters.model}}"
              spacy_model_names: "{{job.parameters.spacy_model_names}}"
          libraries:
            - whl: ../../dist/*.whl

        - task_key: generate_pi
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          depends_on:
            - task_key: generate_comments
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/generate_metadata.py
            base_parameters:
              mode: "pi"
              table_names: "{{job.parameters.table_names}}"
              catalog_name: "{{job.parameters.catalog_name}}"
              current_user: "{{job.parameters.current_user}}"
              permission_groups: "{{job.parameters.permission_groups}}"
              permission_users: "{{job.parameters.permission_users}}"
              run_id: "{{job.parameters.run_id}}"
              ontology_bundle: "{{job.parameters.ontology_bundle}}"
              domain_config_path: "{{job.parameters.domain_config_path}}"
              model: "{{job.parameters.model}}"
              spacy_model_names: "{{job.parameters.spacy_model_names}}"
          libraries:
            - whl: ../../dist/*.whl

        - task_key: generate_domain
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          depends_on:
            - task_key: generate_comments
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/generate_metadata.py
            base_parameters:
              mode: "domain"
              table_names: "{{job.parameters.table_names}}"
              catalog_name: "{{job.parameters.catalog_name}}"
              current_user: "{{job.parameters.current_user}}"
              permission_groups: "{{job.parameters.permission_groups}}"
              permission_users: "{{job.parameters.permission_users}}"
              run_id: "{{job.parameters.run_id}}"
              ontology_bundle: "{{job.parameters.ontology_bundle}}"
              domain_config_path: "{{job.parameters.domain_config_path}}"
              model: "{{job.parameters.model}}"
              spacy_model_names: "{{job.parameters.spacy_model_names}}"
          libraries:
            - whl: ../../dist/*.whl

        # ------------------------------------------------------------------
        # Stage 3: Build KBs (update with enriched LLM output)
        # ------------------------------------------------------------------
        - task_key: build_knowledge_base
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: generate_comments
            - task_key: generate_pi
            - task_key: generate_domain
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/build_knowledge_base.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
          libraries:
            - whl: ../../dist/*.whl

        - task_key: build_column_kb
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: generate_comments
            - task_key: generate_pi
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/build_column_kb.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
          libraries:
            - whl: ../../dist/*.whl

        - task_key: build_schema_kb
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: build_knowledge_base
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/build_schema_kb.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              generate_comments: "true"
          libraries:
            - whl: ../../dist/*.whl

        # ------------------------------------------------------------------
        # Stage 4: Knowledge graph + embeddings
        # ------------------------------------------------------------------
        - task_key: build_knowledge_graph
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: build_column_kb
            - task_key: build_schema_kb
            - task_key: extract_extended_metadata
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/build_knowledge_graph.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
          libraries:
            - whl: ../../dist/*.whl
            - pypi:
                package: graphframes

        - task_key: generate_embeddings
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: build_knowledge_graph
            - task_key: build_ontology
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/generate_embeddings.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
          libraries:
            - whl: ../../dist/*.whl

        # ------------------------------------------------------------------
        # Stage 5: Similarity, clustering, data quality, ontology validation
        # ------------------------------------------------------------------
        - task_key: build_similarity_edges
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: generate_embeddings
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/build_similarity_edges.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              similarity_threshold: "{{job.parameters.similarity_threshold}}"
              max_edges_per_node: "{{job.parameters.max_edges_per_node}}"
              use_ann_similarity: "{{job.parameters.use_ann_similarity}}"
          libraries:
            - whl: ../../dist/*.whl

        - task_key: cluster_analysis
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: generate_embeddings
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/cluster_analysis.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              min_k: "{{job.parameters.cluster_min_k}}"
              max_k: "{{job.parameters.cluster_max_k}}"
              node_types: "{{job.parameters.cluster_node_types}}"
          libraries:
            - whl: ../../dist/*.whl

        - task_key: compute_data_quality
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: run_profiling
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/compute_data_quality.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
          libraries:
            - whl: ../../dist/*.whl

        - task_key: validate_ontology
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: build_ontology
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/validate_ontology.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
          libraries:
            - whl: ../../dist/*.whl

        # ------------------------------------------------------------------
        # Stage 6: FK prediction + final analysis
        # ------------------------------------------------------------------
        - task_key: predict_foreign_keys
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          depends_on:
            - task_key: build_similarity_edges
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/predict_foreign_keys.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              column_similarity_threshold: "0.75"
              table_similarity_threshold: "0.7"
              confidence_threshold: "0.7"
              apply_ddl: "false"
              dry_run: "false"
              incremental: "{{job.parameters.incremental}}"
          libraries:
            - whl: ../../dist/*.whl

        - task_key: final_analysis
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: predict_foreign_keys
            - task_key: cluster_analysis
            - task_key: compute_data_quality
            - task_key: validate_ontology
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/final_analysis.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
          libraries:
            - whl: ../../dist/*.whl

        # ------------------------------------------------------------------
        # Stage 7: Vector index
        # ------------------------------------------------------------------
        - task_key: build_vector_index
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: final_analysis
          job_cluster_key: analytics_cluster
          notebook_task:
            notebook_path: ../../notebooks/build_vector_index.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              endpoint_name: "dbxmetagen-vs"
              sweep_stale_docs: "false"
          libraries:
            - whl: ../../dist/*.whl

      job_clusters:
        - job_cluster_key: analytics_cluster
          new_cluster:
            policy_id: ${var.policy_id}
            spark_version: 17.3.x-cpu-ml-scala2.13
            node_type_id: ${var.node_type}
            data_security_mode: SINGLE_USER
            autoscale:
              min_workers: 1
              max_workers: 4
            # --- Uncomment for AWS ---
            # aws_attributes:
            #   first_on_demand: 1
            #   availability: SPOT_WITH_FALLBACK
            # --- Uncomment for Azure ---
            # azure_attributes:
            #   first_on_demand: 1
            #   availability: SPOT_WITH_FALLBACK_AZURE


resources:
  jobs:
    knowledge_base_builder_job:
      name: "${var.app_name}_knowledge_base_job"

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      # Job parameters that can be passed at runtime
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}

      tasks:
        - task_key: build_knowledge_base
          max_retries: 1
          job_cluster_key: kb_cluster

          notebook_task:
            notebook_path: ../../notebooks/build_knowledge_base.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"

          libraries:
            - whl: ../../dist/*.whl

        - task_key: build_knowledge_graph
          max_retries: 1
          depends_on:
            - task_key: build_knowledge_base
          # ML cluster required - GraphFrames needs JVM dependencies not available on serverless
          job_cluster_key: kb_cluster

          notebook_task:
            notebook_path: ../../notebooks/build_knowledge_graph.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"

          libraries:
            - whl: ../../dist/*.whl
            - pypi:
                package: graphframes

      job_clusters:
        - job_cluster_key: kb_cluster
          new_cluster:
            policy_id: ${var.policy_id}
            spark_version: 17.3.x-cpu-ml-scala2.13
            node_type_id: ${var.node_type}
            data_security_mode: SINGLE_USER
            num_workers: 1
            # --- Uncomment for AWS ---
            # aws_attributes:
            #   first_on_demand: 1
            #   availability: SPOT_WITH_FALLBACK
            # --- Uncomment for Azure ---
            # azure_attributes:
            #   first_on_demand: 1
            #   availability: SPOT_WITH_FALLBACK_AZURE


resources:
  jobs:
    sync_ddl_job:
      name: "${var.app_name}_sync_ddl_job"

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      # Job parameters for DDL sync
      parameters:
        - name: reviewed_file_name
          default: ""
        - name: mode
          default: "comment"
        - name: current_user_override
          default: ${var.current_user}

      tasks:
        - task_key: sync_reviewed_ddl
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          job_cluster_key: sync_cluster

          notebook_task:
            notebook_path: ../../notebooks/sync_reviewed_ddl.py
            base_parameters:
              reviewed_file_name: "{{job.parameters.reviewed_file_name}}"
              mode: "{{job.parameters.mode}}"
              current_user_override: "{{job.parameters.current_user_override}}"

          libraries:
            - whl: ../../dist/*.whl

      job_clusters:
        - job_cluster_key: sync_cluster
          new_cluster:
            apply_policy_default_values: true
            policy_id: ${var.policy_id}
            spark_version: 17.3.x-cpu-ml-scala2.13
            node_type_id: ${var.node_type}
            data_security_mode: SINGLE_USER
            autoscale:
              min_workers: 1
              max_workers: 2
            custom_tags:
              project: dbxmetagen
resources:
  jobs:
    setup_mcp_servers_job:
      name: "${var.app_name}_setup_mcp_servers"

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: vs_index_name
          default: "metadata_vs_index"
        - name: drop_existing
          default: "false"

      tasks:
        - task_key: setup_mcp
          max_retries: 1
          job_cluster_key: mcp_cluster

          notebook_task:
            notebook_path: ../../notebooks/setup_mcp_servers.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              vs_index_name: "{{job.parameters.vs_index_name}}"
              drop_existing: "{{job.parameters.drop_existing}}"

      job_clusters:
        - job_cluster_key: mcp_cluster
          new_cluster:
            policy_id: ${var.policy_id}
            spark_version: 17.3.x-cpu-ml-scala2.13
            node_type_id: ${var.node_type}
            data_security_mode: SINGLE_USER
            num_workers: 0
            spark_conf:
              spark.master: "local[*, 4]"
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ResourceClass: SingleNode

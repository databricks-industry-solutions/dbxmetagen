# Import Comments: Bootstrap UC comments -> KB build -> PI + Domain
#
# Imports existing UC table/column comments from information_schema into
# metadata_generation_log (no LLM calls), builds KB tables, then runs PI
# and domain classification with use_kb_comments=true so the imported
# descriptions enrich PI/domain prompts.

resources:
  jobs:
    metadata_import_comments_job:
      name: "${var.app_name}_import_comments_job"
      budget_policy_id: ${var.budget_policy_id}
      max_concurrent_runs: 5

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      parameters:
        - name: table_names
          default: ${var.job_table_names}
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: apply_ddl
          default: "false"
        - name: federation_mode
          default: "false"
        - name: current_user
          default: ${var.current_user}
        - name: permission_groups
          default: ${var.permission_groups}
        - name: permission_users
          default: ${var.permission_users}
        - name: run_id
          default: "{{job.run_id}}"
        - name: include_previously_failed_tables
          default: "false"
        - name: ontology_bundle
          default: ""
        - name: domain_config_path
          default: ""
        - name: sample_size
          default: "5"
        - name: include_lineage
          default: "false"
        - name: model
          default: "databricks-claude-sonnet-4-6"
        - name: spacy_model_names
          default: ${var.spacy_model_names}

      tasks:
        - task_key: bootstrap_knowledge_bases
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/bootstrap_knowledge_bases.py
            base_parameters:
              table_names: "{{job.parameters.table_names}}"
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              populate_log: "true"

        - task_key: build_knowledge_base
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: bootstrap_knowledge_bases
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/build_knowledge_base.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"

        - task_key: build_column_kb
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: bootstrap_knowledge_bases
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/build_column_kb.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"

        - task_key: generate_pi
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          depends_on:
            - task_key: build_knowledge_base
            - task_key: build_column_kb
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/generate_metadata.py
            base_parameters:
              mode: "pi"
              table_names: "{{job.parameters.table_names}}"
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              apply_ddl: "{{job.parameters.apply_ddl}}"
              federation_mode: "{{job.parameters.federation_mode}}"
              current_user: "{{job.parameters.current_user}}"
              permission_groups: "{{job.parameters.permission_groups}}"
              permission_users: "{{job.parameters.permission_users}}"
              run_id: "{{job.parameters.run_id}}"
              cleanup_control_table: "false"
              include_previously_failed_tables: "{{job.parameters.include_previously_failed_tables}}"
              include_existing_table_comment: "true"
              use_kb_comments: "true"
              ontology_bundle: "{{job.parameters.ontology_bundle}}"
              domain_config_path: "{{job.parameters.domain_config_path}}"
              sample_size: "{{job.parameters.sample_size}}"
              include_lineage: "{{job.parameters.include_lineage}}"
              model: "{{job.parameters.model}}"
              spacy_model_names: "{{job.parameters.spacy_model_names}}"

        - task_key: generate_domain
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 86400
          depends_on:
            - task_key: build_knowledge_base
            - task_key: build_column_kb
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/generate_metadata.py
            base_parameters:
              mode: "domain"
              table_names: "{{job.parameters.table_names}}"
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              apply_ddl: "{{job.parameters.apply_ddl}}"
              federation_mode: "{{job.parameters.federation_mode}}"
              current_user: "{{job.parameters.current_user}}"
              permission_groups: "{{job.parameters.permission_groups}}"
              permission_users: "{{job.parameters.permission_users}}"
              run_id: "{{job.parameters.run_id}}"
              cleanup_control_table: "false"
              include_previously_failed_tables: "{{job.parameters.include_previously_failed_tables}}"
              include_existing_table_comment: "true"
              use_kb_comments: "true"
              ontology_bundle: "{{job.parameters.ontology_bundle}}"
              domain_config_path: "{{job.parameters.domain_config_path}}"
              sample_size: "{{job.parameters.sample_size}}"
              include_lineage: "{{job.parameters.include_lineage}}"
              model: "{{job.parameters.model}}"
              spacy_model_names: "{{job.parameters.spacy_model_names}}"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ../../dist/*.whl

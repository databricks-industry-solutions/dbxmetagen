resources:
  jobs:
    build_vector_index_job:
      name: "${var.app_name}_build_vector_index"

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: endpoint_name
          default: ${var.vs_endpoint_name}
        - name: sweep_stale_docs
          default: "false"

      tasks:
        - task_key: build_vector_index
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          job_cluster_key: vector_index_cluster
          notebook_task:
            notebook_path: ../../notebooks/build_vector_index.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              endpoint_name: "{{job.parameters.endpoint_name}}"
              sweep_stale_docs: "{{job.parameters.sweep_stale_docs}}"
          libraries:
            # - whl: ../../dist/*.whl  # installed via %pip in notebook
            - pypi:
                package: databricks-langchain==0.4.0
            - pypi:
                package: openai==1.56.1
            - pypi:
                package: openpyxl==3.1.5
            - pypi:
                package: deprecated==1.2.13
            - pypi:
                package: "nest-asyncio>=1.6.0,<2"
            - pypi:
                package: mlflow==3.6.0
            - pypi:
                package: cloudpickle==3.1.0
            - pypi:
                package: pydantic==2.10.3
            - pypi:
                package: "ydata-profiling>=4.12.1,<5"
            - pypi:
                package: databricks-sdk==0.68.0
            - pypi:
                package: pyyaml==6.0.1
            - pypi:
                package: requests==2.32.5

      job_clusters:
        - job_cluster_key: vector_index_cluster
          new_cluster:
            apply_policy_default_values: true
            policy_id: ${var.policy_id}
            spark_version: 17.3.x-cpu-ml-scala2.13
            node_type_id: ${var.node_type}
            data_security_mode: SINGLE_USER
            num_workers: 1
            custom_tags:
              project: dbxmetagen
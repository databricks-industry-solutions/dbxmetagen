resources:
  jobs:
    eval_setup_job:
      name: "${var.app_name}_eval_setup"
      budget_policy_id: ${var.budget_policy_id}

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: eval_data

      tasks:
        - task_key: create_eval_tables
          max_retries: 0
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/evaluation/eval_setup.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ../../dist/*.whl
              - faker

resources:
  jobs:
    profiling_job:
      name: "${var.app_name}_profiling_job"

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: max_tables
          default: ""

      tasks:
        - task_key: run_profiling
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          job_cluster_key: profiling_cluster

          notebook_task:
            notebook_path: ../../notebooks/run_profiling.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              max_tables: "{{job.parameters.max_tables}}"

          libraries:
            # - whl: ../../dist/*.whl  # installed via %pip in notebook
            - pypi:
                package: databricks-langchain==0.4.0
            - pypi:
                package: openai==1.56.1
            - pypi:
                package: openpyxl==3.1.5
            - pypi:
                package: deprecated==1.2.13
            - pypi:
                package: "nest-asyncio>=1.6.0,<2"
            - pypi:
                package: mlflow==3.6.0
            - pypi:
                package: cloudpickle==3.1.0
            - pypi:
                package: pydantic==2.10.3
            - pypi:
                package: "ydata-profiling>=4.12.1,<5"
            - pypi:
                package: databricks-sdk==0.68.0
            - pypi:
                package: pyyaml==6.0.1
            - pypi:
                package: requests==2.32.5

        - task_key: compute_quality_scores
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: run_profiling
          job_cluster_key: profiling_cluster

          notebook_task:
            notebook_path: ../../notebooks/compute_data_quality.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"

          libraries:
            # - whl: ../../dist/*.whl  # installed via %pip in notebook
            - pypi:
                package: databricks-langchain==0.4.0
            - pypi:
                package: openai==1.56.1
            - pypi:
                package: openpyxl==3.1.5
            - pypi:
                package: deprecated==1.2.13
            - pypi:
                package: "nest-asyncio>=1.6.0,<2"
            - pypi:
                package: mlflow==3.6.0
            - pypi:
                package: cloudpickle==3.1.0
            - pypi:
                package: pydantic==2.10.3
            - pypi:
                package: "ydata-profiling>=4.12.1,<5"
            - pypi:
                package: databricks-sdk==0.68.0
            - pypi:
                package: pyyaml==6.0.1
            - pypi:
                package: requests==2.32.5

        - task_key: update_graph_quality
          max_retries: 1
          min_retry_interval_millis: 600000
          timeout_seconds: 14400
          depends_on:
            - task_key: compute_quality_scores
          job_cluster_key: profiling_cluster

          notebook_task:
            notebook_path: ../../notebooks/update_graph_quality.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"

          libraries:
            # - whl: ../../dist/*.whl  # installed via %pip in notebook
            - pypi:
                package: databricks-langchain==0.4.0
            - pypi:
                package: openai==1.56.1
            - pypi:
                package: openpyxl==3.1.5
            - pypi:
                package: deprecated==1.2.13
            - pypi:
                package: "nest-asyncio>=1.6.0,<2"
            - pypi:
                package: mlflow==3.6.0
            - pypi:
                package: cloudpickle==3.1.0
            - pypi:
                package: pydantic==2.10.3
            - pypi:
                package: "ydata-profiling>=4.12.1,<5"
            - pypi:
                package: databricks-sdk==0.68.0
            - pypi:
                package: pyyaml==6.0.1
            - pypi:
                package: requests==2.32.5

      job_clusters:
        - job_cluster_key: profiling_cluster
          new_cluster:
            apply_policy_default_values: true
            policy_id: ${var.policy_id}
            spark_version: 17.3.x-cpu-ml-scala2.13
            node_type_id: ${var.node_type}
            data_security_mode: SINGLE_USER
            num_workers: 1
            custom_tags:
              project: dbxmetagen

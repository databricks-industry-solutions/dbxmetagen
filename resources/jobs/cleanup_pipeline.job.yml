resources:
  jobs:
    cleanup_pipeline_job:
      name: "${var.app_name}_cleanup_pipeline"
      budget_policy_id: ${var.budget_policy_id}

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: dry_run
          default: "true"
        - name: include_control_table
          default: "true"

      tasks:
        - task_key: cleanup_tables
          environment_key: default

          notebook_task:
            notebook_path: ../../notebooks/cleanup_pipeline_tables.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              dry_run: "{{job.parameters.dry_run}}"
              include_control_table: "{{job.parameters.include_control_table}}"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ../../dist/*.whl

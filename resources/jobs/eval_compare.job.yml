resources:
  jobs:
    eval_compare_job:
      name: "${var.app_name}_eval_compare"

      permissions:
        - service_principal_name: ${resources.apps.dbxmetagen_app.service_principal_client_id}
          level: CAN_MANAGE_RUN

      email_notifications:
        on_failure:
          - ${var.current_user}

      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: eval_schema
          default: eval_data
        - name: pipeline_schema
          default: ${var.schema_name}
        - name: run_label
          default: ""

      tasks:
        - task_key: compare_and_score
          max_retries: 0
          job_cluster_key: eval_cluster
          notebook_task:
            notebook_path: ../../notebooks/evaluation/eval_compare.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              eval_schema: "{{job.parameters.eval_schema}}"
              pipeline_schema: "{{job.parameters.pipeline_schema}}"
              run_label: "{{job.parameters.run_label}}"
          libraries:
            - whl: ../../dist/*.whl

      job_clusters:
        - job_cluster_key: eval_cluster
          new_cluster:
            spark_version: 17.3.x-cpu-ml-scala2.13
            node_type_id: ${var.node_type}
            data_security_mode: SINGLE_USER
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: SingleNode

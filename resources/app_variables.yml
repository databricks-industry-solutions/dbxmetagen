variables:
  deploying_user:
    description: User who deploys the asset bundle (for notebook paths). Must match the deploying_user in variables.yml.
    default: ${workspace.current_user.userName}
  app_name:
    description: >-
      Display name of the Databricks App and prefix for all job names
      (e.g. <app_name>_metadata_job). Change this to avoid collisions
      when deploying multiple instances to the same workspace outside
      of DAB development mode. In development mode, DAB already
      prefixes with the deploying user's name.
    default: "dbxmetagen-app"
  app_service_principal_application_id:
    description: Application ID of the service principal used for the Databricks app. This service principal will be granted CAN_MANAGE permissions on the bundle resources. If not set, the app will use the current user context.
    default: "None"
  lakebase_catalog:
    description: "Lakebase catalog name for GraphRAG graph data"
    default: "dbxmetagen_graphrag"
  lakebase_instance_name:
    description: "Lakebase instance name"
    default: "dbxmetagen"
  lakebase_database_name:
    description: "PG-level database name within the Lakebase instance"
    default: "knowledge_base"

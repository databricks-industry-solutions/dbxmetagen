variables:
  deploying_user:
    description: User who deploys the asset bundle (for notebook paths). Must match the deploying_user in variables.yml.
    default: ${workspace.current_user.userName}
  app_name:
    description: >-
      Display name of the Databricks App and prefix for all job names
      (e.g. <app_name>_metadata_job). Change this to avoid collisions
      when deploying multiple instances to the same workspace outside
      of DAB development mode. In development mode, DAB already
      prefixes with the deploying user's name.
    default: "dbxmetagen-app"
  app_name_suffix:
    description: >-
      Optional suffix appended to the app name and job-name prefix (e.g.
      "-dev", "-team1"). Empty by default so the app is named exactly
      app_name. Set this to deploy multiple independent instances to ONE
      workspace (e.g. different targets or teams) without them overwriting
      each other's single app resource.
    default: ""
  user_api_scopes:
    description: >-
      OBO OAuth scopes granted to the app for On-Behalf-Of user auth. Empty by
      default (OBO off). When enable_obo=true, override this complex variable to
      e.g. ["files.files", "sql.statement-execution", "dashboards.genie"], for
      example in a gitignored variable-overrides.json.
    type: complex
    default: []
  app_permissions:
    description: >-
      Who can open the app UI (CAN_USE). Empty by default; the deploying user
      already has CAN_MANAGE via the target permissions block. Override this
      complex variable to grant groups/users, e.g.
      [{"group_name": "account users", "level": "CAN_USE"}].
    type: complex
    default: []
  lakebase_catalog:
    description: "Lakebase catalog name for GraphRAG graph data"
    default: "dbxmetagen_graphrag"
  lakebase_instance_name:
    description: "Lakebase instance name"
    default: "dbxmetagen"
  lakebase_database_name:
    description: "PG-level database name within the Lakebase instance"
    default: "knowledge_base"

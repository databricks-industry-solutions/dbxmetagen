repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-docstring-first

  - repo: local
    hooks:
      - id: rebuild-frontend
        name: Rebuild frontend
        language: system
        entry: bash -c 'cd apps/dbxmetagen-app/app/src && npm install --silent && npm run build && cd ../../../.. && git add apps/dbxmetagen-app/app/src/dist/'
        files: ^apps/dbxmetagen-app/app/src/(?!dist/)
        pass_filenames: false
        stages: [pre-commit]

      - id: sync-requirements
        name: Sync requirements.txt from uv.lock
        language: system
        entry: bash scripts/export_requirements.sh
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
        stages: [pre-commit]

      - id: pure-logic-tests
        name: Pure logic tests
        language: system
        entry: bash -c 'uv run pytest tests/test_pure_logic.py -x -q'
        files: ^src/dbxmetagen/
        pass_filenames: false
        stages: [pre-commit]
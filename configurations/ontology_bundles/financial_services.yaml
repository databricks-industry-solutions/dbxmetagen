# Financial Services Ontology Bundle
# Aligned with BIAN (Banking Industry Architecture Network) and FIBO

metadata:
  name: "Financial Services"
  version: "3.0"
  industry: "financial_services"
  description: "Banking, insurance, and capital markets ontology with financial instrument and risk entity types"
  standards_alignment: "BIAN, FIBO, ISO 20022"

ontology:
  version: "3.0"
  name: "Financial Services Business Ontology"
  description: "Entity types for banking, insurance, investments, and financial operations"

  property_roles:
    primary_key:
      description: "Surrogate or technical row identifier"
      maps_to_kind: "data_property"
      semantic_role: "identifier"
    business_key:
      description: "Natural key meaningful to users"
      maps_to_kind: "data_property"
      semantic_role: "identifier"
    measure:
      description: "Numeric value to aggregate"
      maps_to_kind: "data_property"
      semantic_role: "metric"
    dimension:
      description: "Categorical filter or grouping attribute"
      maps_to_kind: "data_property"
      semantic_role: "dimension"
    temporal:
      description: "Date or timestamp of event"
      maps_to_kind: "data_property"
      semantic_role: "temporal"
    geographic:
      description: "Location-based dimension (country, city, region, coordinates)"
      maps_to_kind: "data_property"
      semantic_role: "geographic"
    object_property:
      description: "FK or reference to another entity's identifier"
      maps_to_kind: "object_property"
      semantic_role: "relationship"
    composite_component:
      description: "Part of a multi-column value object"
      maps_to_kind: "data_property"
      semantic_role: "component"
    label:
      description: "Human-readable name or title"
      maps_to_kind: "data_property"
      semantic_role: "label"
    pii:
      description: "Personally identifiable information"
      maps_to_kind: "data_property"
      semantic_role: "pii"
      governance_flag: true
    audit:
      description: "System-generated provenance column"
      maps_to_kind: "data_property"
      semantic_role: "provenance"
    derived:
      description: "Computed from other columns"
      maps_to_kind: "data_property"
      semantic_role: "derived"

  edge_catalog:
    instance_of: { inverse: type_of, symmetric: false, category: structural }
    subclass_of: { inverse: superclass_of, symmetric: false, category: structural }
    has_part: { inverse: part_of, symmetric: false, category: structural }
    contains: { inverse: contained_in, symmetric: false, category: structural }
    member_of: { inverse: has_member, symmetric: false, category: structural }
    has_account: { inverse: account_of, domain: Person, range: Account, symmetric: false, category: business }
    holds: { inverse: held_by, domain: [Person, Organization], range: Portfolio, symmetric: false, category: business }
    issued_by: { inverse: issues, domain: [Loan, Policy, Instrument], range: Organization, symmetric: false, category: business }
    covers: { inverse: covered_by, domain: Policy, range: [Person, Organization], symmetric: false, category: business }
    placed_by: { inverse: placed, domain: Transaction, range: Person, symmetric: false, category: business }
    created_by: { inverse: created, domain: Any, range: Person, symmetric: false, category: business }
    owned_by: { inverse: owns, domain: Any, range: [Person, Organization], symmetric: false, category: business }
    references: { inverse: referenced_by, domain: Any, range: Reference, symmetric: false, category: business }
    located_at: { inverse: location_of, domain: Any, range: Location, symmetric: false, category: business }
    derives_from: { inverse: source_of, symmetric: false, category: lineage }
    same_as: { symmetric: true, category: semantic }
    similar_to: { symmetric: true, category: semantic }

  entities:
    auto_discover: true
    discovery_confidence_threshold: 0.4

    definitions:
      # General entities
      Person:
        description: "People, customers, contacts, users, or employees"
        keywords: ["customer", "employee", "user", "contact", "person", "applicant", "borrower"]
        typical_attributes: [id, name, email, phone, address, created_date]
        relationships:
          has_account: { target: Account, cardinality: "one-to-many" }
          part_of: { target: Organization, cardinality: "many-to-one" }
      Organization:
        description: "Companies, departments, facilities, or business units"
        keywords: ["company", "organization", "department", "facility", "tenant", "branch", "subsidiary"]
        typical_attributes: [id, name, type, address, parent_id]
        relationships:
          contains: { target: Person, cardinality: "one-to-many" }
          part_of: { target: Organization, cardinality: "many-to-one" }
      Product:
        description: "Goods, services, SKUs, or catalog items"
        keywords: ["product", "item", "sku", "catalog", "offering"]
        typical_attributes: [id, name, description, price, category, status]
        relationships: {}
      Transaction:
        description: "Orders, purchases, payments, invoices, or financial events"
        keywords: ["transaction", "order", "payment", "invoice", "purchase", "transfer", "wire"]
        typical_attributes: [id, customer_id, amount, date, status, currency]
        relationships:
          on_account: { target: Account, cardinality: "many-to-one" }
          by_person: { target: Person, cardinality: "many-to-one" }
      Location:
        description: "Addresses, sites, regions, facilities, or geographies"
        keywords: ["location", "address", "site", "region", "facility", "branch"]
        typical_attributes: [id, name, address, city, state, country, zip_code]
        relationships: {}
      Event:
        description: "Activities, logs, sessions, audits, or system events"
        keywords: ["event", "activity", "log", "audit", "session"]
        typical_attributes: [id, type, timestamp, user_id, details]
        relationships:
          references: { target: Person, cardinality: "many-to-one" }
      Reference:
        description: "Lookup tables, codes, categories, dimensions, or configuration"
        keywords: ["reference", "lookup", "code", "category", "dim_"]
        typical_attributes: [id, code, name, description, active]
        relationships: {}
      Metric:
        description: "KPIs, aggregates, facts, summaries, or analytic measures"
        keywords: ["metric", "kpi", "aggregate", "fact_", "summary"]
        typical_attributes: [id, name, value, period, dimension]
        relationships: {}
      Document:
        description: "Unstructured content, notes, files, or text records"
        keywords: ["document", "note", "file", "content", "text", "contract", "agreement"]
        typical_attributes: [id, title, body, author, created_date, type]
        relationships:
          references: { target: Person, cardinality: "many-to-one" }

      # Financial Services entities
      Account:
        description: "Bank accounts, investment accounts, loan accounts, or general ledger accounts"
        keywords: ["account", "deposit", "savings", "checking", "loan_account", "gl_account"]
        typical_attributes: [id, account_number, type, balance, currency, status, open_date]
        relationships:
          owned_by: { target: Person, cardinality: "many-to-one" }
          has_transaction: { target: Transaction, cardinality: "one-to-many" }
        properties:
          identifier:
            kind: data_property
            role: primary_key
            typical_attributes: ["id", "account_id"]
          account_number:
            kind: data_property
            role: business_key
            typical_attributes: ["account_number", "acct_number", "account_no"]
          balance:
            kind: data_property
            role: measure
            typical_attributes: ["balance", "current_balance", "available_balance"]
          type:
            kind: data_property
            role: dimension
            typical_attributes: ["type", "account_type", "product_type"]
          status:
            kind: data_property
            role: dimension
            typical_attributes: ["status", "account_status", "state"]
          currency:
            kind: data_property
            role: dimension
            typical_attributes: ["currency", "currency_code"]
          open_date:
            kind: data_property
            role: temporal
            typical_attributes: ["open_date", "opened_date", "created_date"]
          owned_by:
            kind: object_property
            role: object_property
            edge: owned_by
            target_entity: Person
            typical_attributes: ["owner_id", "customer_id", "person_id"]
      Portfolio:
        description: "Investment portfolios, fund holdings, or asset allocations"
        keywords: ["portfolio", "fund", "holding", "allocation", "basket"]
        typical_attributes: [id, name, manager, strategy, aum, benchmark]
        relationships:
          contains: { target: Instrument, cardinality: "many-to-many" }
          managed_by: { target: Person, cardinality: "many-to-one" }
        properties:
          identifier:
            kind: data_property
            role: primary_key
            typical_attributes: ["id", "portfolio_id"]
          name:
            kind: data_property
            role: label
            typical_attributes: ["name", "portfolio_name"]
          aum:
            kind: data_property
            role: measure
            typical_attributes: ["aum", "assets_under_management", "total_value"]
          strategy:
            kind: data_property
            role: dimension
            typical_attributes: ["strategy", "investment_strategy", "style"]
          benchmark:
            kind: data_property
            role: dimension
            typical_attributes: ["benchmark", "benchmark_index"]
          managed_by:
            kind: object_property
            role: object_property
            edge: held_by
            target_entity: Person
            typical_attributes: ["manager", "manager_id", "advisor_id"]
      Trade:
        description: "Securities trades, FX transactions, or market orders"
        keywords: ["trade", "execution", "fill", "market_order", "limit_order", "swap"]
        typical_attributes: [id, instrument_id, side, quantity, price, timestamp, status]
        relationships:
          of_instrument: { target: Instrument, cardinality: "many-to-one" }
          with_counterparty: { target: Counterparty, cardinality: "many-to-one" }
          on_account: { target: Account, cardinality: "many-to-one" }
      Instrument:
        description: "Financial instruments -- equities, bonds, derivatives, currencies"
        keywords: ["instrument", "security", "equity", "bond", "derivative", "option", "future", "isin", "cusip"]
        typical_attributes: [id, symbol, isin, cusip, type, currency, issuer, maturity_date]
        relationships:
          hedges: { target: Risk, cardinality: "many-to-many" }
        properties:
          identifier:
            kind: data_property
            role: primary_key
            typical_attributes: ["id", "instrument_id", "security_id"]
          symbol:
            kind: data_property
            role: business_key
            typical_attributes: ["symbol", "ticker", "ticker_symbol"]
          isin:
            kind: data_property
            role: business_key
            typical_attributes: ["isin", "isin_code"]
          cusip:
            kind: data_property
            role: business_key
            typical_attributes: ["cusip", "cusip_id"]
          type:
            kind: data_property
            role: dimension
            typical_attributes: ["type", "instrument_type", "asset_class"]
          currency:
            kind: data_property
            role: dimension
            typical_attributes: ["currency", "currency_code"]
          maturity_date:
            kind: data_property
            role: temporal
            typical_attributes: ["maturity_date", "maturity", "expiry_date"]
          issued_by:
            kind: object_property
            role: object_property
            edge: issued_by
            target_entity: Organization
            typical_attributes: ["issuer", "issuer_id", "issuing_org_id"]
      Counterparty:
        description: "Trading counterparties, custodians, or correspondent banks"
        keywords: ["counterparty", "custodian", "broker", "dealer", "correspondent", "clearing"]
        typical_attributes: [id, name, type, lei, credit_rating, jurisdiction]
        relationships:
          has_trade: { target: Trade, cardinality: "one-to-many" }
      Risk:
        description: "Risk exposures, limits, VaR, stress tests, or credit scores"
        keywords: ["risk", "exposure", "var", "stress_test", "credit_score", "limit", "collateral"]
        typical_attributes: [id, type, value, threshold, entity_id, date]
        relationships:
          for_account: { target: Account, cardinality: "many-to-one" }
          for_instrument: { target: Instrument, cardinality: "many-to-one" }
        properties:
          identifier:
            kind: data_property
            role: primary_key
            typical_attributes: ["id", "risk_id", "assessment_id"]
          value:
            kind: data_property
            role: measure
            typical_attributes: ["value", "var", "exposure", "credit_score"]
          threshold:
            kind: data_property
            role: measure
            typical_attributes: ["threshold", "limit", "max_exposure"]
          type:
            kind: data_property
            role: dimension
            typical_attributes: ["type", "risk_type", "exposure_type"]
          date:
            kind: data_property
            role: temporal
            typical_attributes: ["date", "as_of_date", "assessment_date"]
          for_account:
            kind: object_property
            role: object_property
            edge: references
            target_entity: Account
            typical_attributes: ["entity_id", "account_id"]
          for_instrument:
            kind: object_property
            role: object_property
            edge: references
            target_entity: Instrument
            typical_attributes: ["instrument_id", "security_id"]
      Compliance:
        description: "Regulatory filings, KYC records, AML alerts, or sanctions screening"
        keywords: ["compliance", "kyc", "aml", "sanctions", "filing", "regulatory", "sar"]
        typical_attributes: [id, type, status, entity_id, date, resolution]
        relationships:
          for_person: { target: Person, cardinality: "many-to-one" }
          for_organization: { target: Organization, cardinality: "many-to-one" }
      Claim:
        description: "Insurance claims, loss events, or reimbursement requests"
        keywords: ["claim", "loss", "incident", "reimbursement", "adjudication"]
        typical_attributes: [id, policy_id, amount, date, status, type]
        relationships:
          on_policy: { target: Policy, cardinality: "many-to-one" }
          filed_by: { target: Person, cardinality: "many-to-one" }
      Policy:
        description: "Insurance policies, coverage terms, or underwriting records"
        keywords: ["policy", "coverage", "underwriting", "premium", "insured", "endorsement"]
        typical_attributes: [id, policy_number, type, premium, effective_date, expiry_date]
        relationships:
          held_by: { target: Person, cardinality: "many-to-one" }
          issued_by: { target: Organization, cardinality: "many-to-one" }
        properties:
          identifier:
            kind: data_property
            role: primary_key
            typical_attributes: ["id", "policy_id"]
          policy_number:
            kind: data_property
            role: business_key
            typical_attributes: ["policy_number", "policy_no", "policy_ref"]
          premium:
            kind: data_property
            role: measure
            typical_attributes: ["premium", "annual_premium", "premium_amount"]
          type:
            kind: data_property
            role: dimension
            typical_attributes: ["type", "policy_type", "coverage_type"]
          effective_date:
            kind: data_property
            role: temporal
            typical_attributes: ["effective_date", "start_date", "inception_date"]
          expiry_date:
            kind: data_property
            role: temporal
            typical_attributes: ["expiry_date", "end_date", "expiration_date"]
          held_by:
            kind: object_property
            role: object_property
            edge: covers
            target_entity: [Person, Organization]
            typical_attributes: ["insured_id", "policyholder_id", "holder_id"]
          issued_by:
            kind: object_property
            role: object_property
            edge: issued_by
            target_entity: Organization
            typical_attributes: ["issuer_id", "carrier_id", "underwriter_id"]
      Loan:
        description: "Loans, mortgages, credit facilities, or lending agreements"
        keywords: ["loan", "mortgage", "credit_facility", "lending", "origination", "amortization"]
        typical_attributes: [id, borrower_id, principal, rate, term, status, origination_date]
        relationships:
          borrowed_by: { target: Person, cardinality: "many-to-one" }
          secures: { target: Account, cardinality: "many-to-one" }
          has_risk: { target: Risk, cardinality: "one-to-many" }
        properties:
          identifier:
            kind: data_property
            role: primary_key
            typical_attributes: ["id", "loan_id"]
          principal:
            kind: data_property
            role: measure
            typical_attributes: ["principal", "loan_amount", "original_principal"]
          rate:
            kind: data_property
            role: measure
            typical_attributes: ["rate", "interest_rate", "apr"]
          term:
            kind: data_property
            role: measure
            typical_attributes: ["term", "term_months", "loan_term"]
          status:
            kind: data_property
            role: dimension
            typical_attributes: ["status", "loan_status", "state"]
          origination_date:
            kind: data_property
            role: temporal
            typical_attributes: ["origination_date", "originated_date", "funding_date"]
          borrowed_by:
            kind: object_property
            role: object_property
            edge: owned_by
            target_entity: Person
            typical_attributes: ["borrower_id", "customer_id", "applicant_id"]
          issued_by:
            kind: object_property
            role: object_property
            edge: issued_by
            target_entity: Organization
            typical_attributes: ["lender_id", "issuer_id", "originating_org_id"]

  domain_entity_affinity:
    banking:
      [
        Account,
        Transaction,
        Person,
        Organization,
        Loan,
        Counterparty,
        Reference,
        Location,
      ]
    capital_markets:
      [
        Trade,
        Instrument,
        Portfolio,
        Counterparty,
        Risk,
        Account,
        Metric,
        Reference,
      ]
    insurance:
      [
        Policy,
        Claim,
        Person,
        Organization,
        Risk,
        Transaction,
        Reference,
        Document,
      ]
    risk_management:
      [Risk, Counterparty, Instrument, Portfolio, Account, Metric, Event]
    compliance_regulatory:
      [
        Compliance,
        Document,
        Person,
        Organization,
        Transaction,
        Reference,
        Event,
      ]
    lending:
      [
        Loan,
        Account,
        Person,
        Organization,
        Risk,
        Transaction,
        Document,
        Reference,
      ]
    wealth_management:
      [
        Portfolio,
        Account,
        Instrument,
        Person,
        Organization,
        Transaction,
        Metric,
      ]
    payments: [Transaction, Account, Person, Organization, Reference, Event]
    finance: [Transaction, Account, Metric, Reference, Organization, Event]
    operations: [Product, Organization, Location, Event, Metric, Reference]
    workforce: [Person, Organization, Location, Event, Reference]
    customer:
      [Person, Organization, Account, Transaction, Event, Metric, Location]
    technology: [Event, Metric, Reference, Organization]
    governance: [Compliance, Document, Reference, Organization, Person]

  relationships:
    types:
      - name: owns
        description: "Entity owns or is responsible for another"
        inverse: owned_by
      - name: contains
        description: "Entity contains or includes another"
        inverse: contained_in
      - name: references
        description: "Entity references another (foreign key)"
        inverse: referenced_by
      - name: derives_from
        description: "Entity is derived from another (lineage)"
        inverse: source_of
      - name: similar_to
        description: "Entity is semantically similar to another"
        inverse: similar_to
        symmetric: true
      - name: part_of
        description: "Entity is part of a larger entity"
        inverse: has_part
      - name: instance_of
        description: "Entity is an instance of a type"
        inverse: type_of
      - name: hedges
        description: "Instrument or trade hedges risk exposure"
        inverse: hedged_by
      - name: secures
        description: "Collateral secures a loan or position"
        inverse: secured_by

  metrics:
    auto_discover: false
    definitions: []

  validation:
    min_entity_confidence: 0.5
    max_entities_per_table: 3
    ai_validation_enabled: true
    classification_model: "databricks-claude-sonnet-4-6"

domains:
  banking:
    name: "Banking"
    description: "Retail and commercial banking, accounts, deposits, and branch operations"
    keywords:
      ["account", "deposit", "branch", "banking", "checking", "savings", "atm"]
    subdomains:
      retail_banking:
        name: "Retail Banking"
        description: "Consumer accounts, checking, savings, debit, and credit card services"
        keywords:
          ["retail", "consumer", "checking", "savings", "debit", "credit_card"]
      commercial_banking:
        name: "Commercial Banking"
        description: "Corporate accounts, treasury services, cash management, and lockbox"
        keywords:
          ["commercial", "corporate", "treasury", "cash_management", "lockbox"]
      digital_banking:
        name: "Digital Banking"
        description: "Mobile banking, online channels, and digital customer experience"
        keywords: ["digital", "mobile", "online", "app", "channel"]

  capital_markets:
    name: "Capital Markets"
    description: "Trading, securities, derivatives, and market operations"
    keywords: ["trade", "security", "equity", "bond", "derivative", "exchange"]
    subdomains:
      equities:
        name: "Equities"
        description: "Stock trading, equity positions, IPOs, and listings"
        keywords: ["equity", "stock", "share", "ipo", "listing"]
      fixed_income:
        name: "Fixed Income"
        description: "Bonds, treasuries, yield curves, and coupon payments"
        keywords: ["bond", "treasury", "yield", "coupon", "maturity"]
      derivatives:
        name: "Derivatives"
        description: "Options, futures, swaps, forwards, and OTC instruments"
        keywords: ["option", "future", "swap", "forward", "otc"]

  insurance:
    name: "Insurance"
    description: "Property, casualty, life, and health insurance operations"
    keywords: ["policy", "claim", "premium", "underwriting", "insured"]
    subdomains:
      underwriting:
        name: "Underwriting"
        description: "Risk assessment, premium rating, and actuarial analysis"
        keywords:
          ["underwriting", "risk_assessment", "premium", "rating", "actuarial"]
      claims:
        name: "Claims"
        description: "Claim filing, loss adjustment, settlement, and subrogation"
        keywords: ["claim", "loss", "adjuster", "settlement", "subrogation"]
      policy_admin:
        name: "Policy Administration"
        description: "Policy lifecycle, endorsements, renewals, and cancellations"
        keywords:
          ["policy", "endorsement", "renewal", "cancellation", "billing"]

  risk_management:
    name: "Risk Management"
    description: "Credit, market, operational, and liquidity risk"
    keywords: ["risk", "exposure", "var", "stress_test", "limit"]
    subdomains:
      credit_risk:
        name: "Credit Risk"
        description: "Default probability, loss given default, exposure at default, and credit ratings"
        keywords: ["credit", "default", "probability", "lgd", "ead", "rating"]
      market_risk:
        name: "Market Risk"
        description: "Value-at-risk, volatility, sensitivity analysis, and greeks"
        keywords: ["market", "var", "volatility", "sensitivity", "greeks"]
      operational_risk:
        name: "Operational Risk"
        description: "Loss events, risk and control self-assessments, and incident management"
        keywords: ["operational", "loss_event", "rcsa", "incident", "control"]

  compliance_regulatory:
    name: "Compliance & Regulatory"
    description: "KYC, AML, sanctions, regulatory reporting, and audit"
    keywords: ["compliance", "kyc", "aml", "regulatory", "sanctions", "sar"]
    subdomains:
      kyc_aml:
        name: "KYC & AML"
        description: "Customer due diligence, enhanced due diligence, sanctions screening, and SARs"
        keywords: ["kyc", "aml", "cdd", "edd", "sanctions", "screening"]
      regulatory_reporting:
        name: "Regulatory Reporting"
        description: "Regulatory filings, CCAR, DFAST, Basel reporting, and stress tests"
        keywords: ["regulatory", "filing", "report", "ccar", "dfast", "basel"]

  lending:
    name: "Lending"
    description: "Loan origination, servicing, collections, and mortgage operations"
    keywords: ["loan", "mortgage", "origination", "servicing", "collections"]
    subdomains:
      origination:
        name: "Origination"
        description: "Loan applications, approvals, underwriting, and closing"
        keywords:
          ["origination", "application", "approval", "underwriting", "closing"]
      servicing:
        name: "Servicing"
        description: "Payment processing, escrow management, statements, and delinquency tracking"
        keywords: ["servicing", "payment", "escrow", "statement", "delinquency"]
      collections:
        name: "Collections"
        description: "Delinquent account management, charge-offs, recovery, and workouts"
        keywords:
          ["collections", "delinquent", "charge_off", "recovery", "workout"]

  wealth_management:
    name: "Wealth Management"
    description: "Portfolio management, advisory, trust, and private banking"
    keywords: ["portfolio", "advisory", "wealth", "trust", "private_banking"]
    subdomains:
      portfolio_management:
        name: "Portfolio Management"
        description: "Asset allocation, rebalancing, benchmark tracking, and performance reporting"
        keywords:
          ["portfolio", "allocation", "rebalance", "benchmark", "performance"]
      advisory:
        name: "Advisory"
        description: "Financial planning, goals-based advice, and investment recommendations"
        keywords: ["advisory", "financial_plan", "goal", "recommendation"]

  payments:
    name: "Payments"
    description: "Payment processing, ACH, wire transfers, and clearing"
    keywords: ["payment", "ach", "wire", "clearing", "settlement", "remittance"]
    subdomains:
      processing:
        name: "Payment Processing"
        description: "Authorization, clearing, settlement, and reconciliation"
        keywords: ["processing", "authorization", "clearing", "settlement"]
      channels:
        name: "Payment Channels"
        description: "ACH, wire transfer, real-time payments, checks, and P2P"
        keywords: ["ach", "wire", "real_time", "check", "p2p"]

  finance:
    name: "Finance"
    description: "Accounting, GL, budgeting, and financial reporting"

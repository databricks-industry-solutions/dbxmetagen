          side:
            kind: data_property
            role: label
            typical_attributes:
            - side
          quantity:
            kind: data_property
            role: label
            typical_attributes:
            - quantity
          price:
            kind: data_property
            role: label
            typical_attributes:
            - price
          timestamp:

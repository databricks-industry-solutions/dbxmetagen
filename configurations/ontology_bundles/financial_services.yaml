metadata:
  name: Financial Services
  version: '3.0'
  format_version: '2.0'
  industry: financial_services
  description: Banking, insurance, and capital markets ontology with financial instrument and risk entity types
  standards_alignment: BIAN, FIBO, ISO 20022
ontology:
  version: '3.0'
  name: Financial Services Business Ontology
  description: Entity types for banking, insurance, investments, and financial operations
  property_roles:
    primary_key:
      description: Surrogate or technical row identifier
      maps_to_kind: data_property
      semantic_role: identifier
    business_key:
      description: Natural key meaningful to users (MRN, NPI)
      maps_to_kind: data_property
      semantic_role: identifier
    object_property:
      description: FK or reference to another entity's identifier
      maps_to_kind: object_property
      semantic_role: relationship
    measure:
      description: Numeric value to aggregate
      maps_to_kind: data_property
      semantic_role: metric
    dimension:
      description: Categorical filter or grouping attribute
      maps_to_kind: data_property
      semantic_role: dimension
    temporal:
      description: Date or timestamp of event
      maps_to_kind: data_property
      semantic_role: temporal
    geographic:
      description: Location-based dimension (country, city, region, coordinates)
      maps_to_kind: data_property
      semantic_role: geographic
    label:
      description: Human-readable name or title
      maps_to_kind: data_property
      semantic_role: label
    pii:
      description: Personally identifiable information
      maps_to_kind: data_property
      semantic_role: pii
      governance_flag: true
    audit:
      description: System-generated provenance column
      maps_to_kind: data_property
      semantic_role: provenance
    derived:
      description: Computed from other columns
      maps_to_kind: data_property
      semantic_role: derived
    composite_component:
      description: Part of a multi-column value object
      maps_to_kind: data_property
      semantic_role: component
  edge_catalog:
    instance_of:
      inverse: type_of
      symmetric: false
      category: structural
    subclass_of:
      inverse: superclass_of
      symmetric: false
      category: structural
    has_part:
      inverse: part_of
      symmetric: false
      category: structural
    contains:
      inverse: contained_in
      symmetric: false
      category: structural
    member_of:
      inverse: has_member
      symmetric: false
      category: structural
    has_account:
      inverse: account_of
      domain: Person
      range: Account
      symmetric: false
      category: business
    holds:
      inverse: held_by
      domain:
      - Person
      - Organization
      range: Portfolio
      symmetric: false
      category: business
    issued_by:
      inverse: issues
      domain:
      - Loan
      - Policy
      - Instrument
      range: Organization
      symmetric: false
      category: business
    covers:
      inverse: covered_by
      domain: Policy
      range:
      - Person
      - Organization
      symmetric: false
      category: business
    placed_by:
      inverse: placed
      domain: Transaction
      range: Person
      symmetric: false
      category: business
    created_by:
      inverse: created
      domain: Any
      range: Person
      symmetric: false
      category: business
    owned_by:
      inverse: owns
      domain: Any
      range:
      - Person
      - Organization
      symmetric: false
      category: business
    references:
      inverse: referenced_by
      domain: Any
      range: Reference
      symmetric: false
      category: business
    located_at:
      inverse: location_of
      domain: Any
      range: Location
      symmetric: false
      category: business
    derives_from:
      inverse: source_of
      symmetric: false
      category: lineage
    same_as:
      symmetric: true
      category: semantic
    similar_to:
      symmetric: true
      category: semantic
  entities:
    auto_discover: true
    discovery_confidence_threshold: 0.4
    definitions:
      Person:
        description: People, customers, contacts, users, or employees
        uri: https://schema.org/Person
        source_ontology: schema.org
        keywords:
        - customer
        - employee
        - user
        - contact
        - person
        - applicant
        - borrower
        typical_attributes:
        - id
        - name
        - email
        - phone
        - address
        - created_date
        relationships:
          has_account:
            target: Account
            cardinality: one-to-many
          part_of:
            target: Organization
            cardinality: many-to-one
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          name:
            kind: data_property
            role: label
            typical_attributes:
            - name
          email:
            kind: data_property
            role: pii
            typical_attributes:
            - email
          phone:
            kind: data_property
            role: pii
            typical_attributes:
            - phone
          address:
            kind: data_property
            role: pii
            typical_attributes:
            - address
          created_date:
            kind: data_property
            role: temporal
            typical_attributes:
            - created_date
      Organization:
        description: Companies, departments, facilities, or business units
        uri: https://schema.org/Organization
        source_ontology: schema.org
        keywords:
        - company
        - organization
        - department
        - facility
        - tenant
        - branch
        - subsidiary
        typical_attributes:
        - id
        - name
        - type
        - address
        - parent_id
        relationships:
          contains:
            target: Person
            cardinality: one-to-many
          part_of:
            target: Organization
            cardinality: many-to-one
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          name:
            kind: data_property
            role: label
            typical_attributes:
            - name
          type:
            kind: data_property
            role: label
            typical_attributes:
            - type
          address:
            kind: data_property
            role: pii
            typical_attributes:
            - address
          parent_id:
            kind: object_property
            role: object_property
            typical_attributes:
            - parent_id
            edge: has_parent
      Product:
        description: Goods, services, SKUs, or catalog items
        uri: https://schema.org/Product
        source_ontology: schema.org
        keywords:
        - product
        - item
        - sku
        - catalog
        - offering
        typical_attributes:
        - id
        - name
        - description
        - price
        - category
        - status
        relationships: {}
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          name:
            kind: data_property
            role: label
            typical_attributes:
            - name
          description:
            kind: data_property
            role: label
            typical_attributes:
            - description
          price:
            kind: data_property
            role: label
            typical_attributes:
            - price
          category:
            kind: data_property
            role: label
            typical_attributes:
            - category
          status:
            kind: data_property
            role: label
            typical_attributes:
            - status
      Transaction:
        description: Orders, purchases, payments, invoices, or financial events
        uri: https://schema.org/Invoice
        source_ontology: schema.org
        keywords:
        - transaction
        - order
        - payment
        - invoice
        - purchase
        - transfer
        - wire
        typical_attributes:
        - id
        - customer_id
        - amount
        - date
        - status
        - currency
        relationships:
          on_account:
            target: Account
            cardinality: many-to-one
          by_person:
            target: Person
            cardinality: many-to-one
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          customer_id:
            kind: object_property
            role: object_property
            typical_attributes:
            - customer_id
            edge: has_customer
          amount:
            kind: data_property
            role: label
            typical_attributes:
            - amount
          date:
            kind: data_property
            role: temporal
            typical_attributes:
            - date
          status:
            kind: data_property
            role: label
            typical_attributes:
            - status
          currency:
            kind: data_property
            role: label
            typical_attributes:
            - currency
      Location:
        description: Addresses, sites, regions, facilities, or geographies
        uri: https://schema.org/Place
        source_ontology: schema.org
        keywords:
        - location
        - address
        - site
        - region
        - facility
        - branch
        typical_attributes:
        - id
        - name
        - address
        - city
        - state
        - country
        - zip_code
        relationships: {}
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          name:
            kind: data_property
            role: label
            typical_attributes:
            - name
          address:
            kind: data_property
            role: pii
            typical_attributes:
            - address
          city:
            kind: data_property
            role: geographic
            typical_attributes:
            - city
          state:
            kind: data_property
            role: geographic
            typical_attributes:
            - state
          country:
            kind: data_property
            role: geographic
            typical_attributes:
            - country
          zip_code:
            kind: data_property
            role: geographic
            typical_attributes:
            - zip_code
      Event:
        description: Activities, logs, sessions, audits, or system events
        uri: https://schema.org/Event
        source_ontology: schema.org
        keywords:
        - event
        - activity
        - log
        - audit
        - session
        typical_attributes:
        - id
        - type
        - timestamp
        - user_id
        - details
        relationships:
          references:
            target: Person
            cardinality: many-to-one
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          type:
            kind: data_property
            role: label
            typical_attributes:
            - type
          timestamp:
            kind: data_property
            role: temporal
            typical_attributes:
            - timestamp
          user_id:
            kind: object_property
            role: object_property
            typical_attributes:
            - user_id
            edge: has_user
          details:
            kind: data_property
            role: label
            typical_attributes:
            - details
      Reference:
        description: Lookup tables, codes, categories, dimensions, or configuration
        uri: https://schema.org/Thing
        source_ontology: schema.org
        keywords:
        - reference
        - lookup
        - code
        - category
        - dim_
        typical_attributes:
        - id
        - code
        - name
        - description
        - active
        relationships: {}
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          code:
            kind: data_property
            role: label
            typical_attributes:
            - code
          name:
            kind: data_property
            role: label
            typical_attributes:
            - name
          description:
            kind: data_property
            role: label
            typical_attributes:
            - description
          active:

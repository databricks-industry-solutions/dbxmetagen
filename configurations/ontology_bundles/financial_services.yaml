        keywords:
        - portfolio
        - fund
        - holding
        - allocation
        - basket
        typical_attributes:
        - id
        - name
        - manager
        - strategy
        - aum
        - benchmark
        relationships:
          contains:
            target: Instrument
            cardinality: many-to-many
          managed_by:
            target: Person
            cardinality: many-to-one
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          name:
            kind: data_property
            role: label
            typical_attributes:
            - name
            - portfolio_name
          manager:
            kind: data_property
            role: label
            typical_attributes:
            - manager
          strategy:
            kind: data_property
            role: dimension
            typical_attributes:

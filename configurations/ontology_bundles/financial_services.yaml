            role: label
            typical_attributes:
            - active
      Metric:
        description: KPIs, aggregates, facts, summaries, or analytic measures
        uri: https://schema.org/QuantitativeValue
        source_ontology: schema.org
        keywords:
        - metric
        - kpi
        - aggregate
        - fact_
        - summary
        typical_attributes:
        - id
        - name
        - value
        - period
        - dimension
        relationships: {}
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          name:
            kind: data_property
            role: label
            typical_attributes:
            - name
          value:
            kind: data_property
            role: label
            typical_attributes:
            - value
          period:
            kind: data_property
            role: label
            typical_attributes:
            - period
          dimension:
            kind: data_property
            role: label
            typical_attributes:
            - dimension
      Document:
        description: Unstructured content, notes, files, or text records
        uri: https://schema.org/DigitalDocument
        source_ontology: schema.org
        keywords:
        - document
        - note
        - file
        - content
        - text
        - contract
        - agreement
        typical_attributes:
        - id
        - title
        - body
        - author
        - created_date
        - type
        relationships:
          references:
            target: Person
            cardinality: many-to-one
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          title:
            kind: data_property
            role: label
            typical_attributes:
            - title
          body:
            kind: data_property
            role: label
            typical_attributes:
            - body
          author:
            kind: data_property
            role: label
            typical_attributes:
            - author
          created_date:
            kind: data_property
            role: temporal
            typical_attributes:
            - created_date
          type:
            kind: data_property
            role: label
            typical_attributes:
            - type
      Account:
        description: Bank accounts, investment accounts, loan accounts, or general ledger accounts
        uri: https://spec.edmcouncil.org/fibo/ontology/FND/AccountingExt/Account
        source_ontology: FIBO
        keywords:
        - account
        - deposit
        - savings
        - checking
        - loan_account
        - gl_account
        typical_attributes:
        - id
        - account_number
        - type
        - balance
        - currency
        - status
        - open_date
        relationships:
          owned_by:
            target: Person
            cardinality: many-to-one
          has_transaction:
            target: Transaction
            cardinality: one-to-many
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          account_number:
            kind: data_property
            role: business_key
            typical_attributes:
            - account_number
            - acct_number
            - account_no
          type:
            kind: data_property
            role: dimension
            typical_attributes:
            - type
            - account_type
            - product_type
          balance:
            kind: data_property
            role: measure
            typical_attributes:
            - balance
            - current_balance
            - available_balance
          currency:
            kind: data_property
            role: dimension
            typical_attributes:
            - currency
            - currency_code
          status:
            kind: data_property
            role: dimension
            typical_attributes:
            - status
            - account_status
            - state
          open_date:
            kind: data_property
            role: temporal
            typical_attributes:
            - open_date
            - opened_date
            - created_date
          identifier:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
            - account_id
          owned_by:
            kind: object_property
            role: object_property
            edge: owned_by
            target_entity: Person
            typical_attributes:
            - owner_id
            - customer_id
            - person_id
      Portfolio:
        description: Investment portfolios, fund holdings, or asset allocations
        uri: https://spec.edmcouncil.org/fibo/ontology/SEC/Securities/Portfolios/Portfolio

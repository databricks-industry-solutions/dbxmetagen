        - execution
        - fill
        - market_order
        - limit_order
        - swap
        typical_attributes:
        - id
        - instrument_id
        - side
        - quantity
        - price
        - timestamp
        - status
        relationships:
          of_instrument:
            target: Instrument
            cardinality: many-to-one
          with_counterparty:
            target: Counterparty
            cardinality: many-to-one
          on_account:
            target: Account
            cardinality: many-to-one
        properties:

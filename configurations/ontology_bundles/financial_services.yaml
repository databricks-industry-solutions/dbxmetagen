            - assets_under_management
            - total_value
          benchmark:
            kind: data_property
            role: dimension
            typical_attributes:
            - benchmark
            - benchmark_index
          identifier:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
            - portfolio_id
          managed_by:
            kind: object_property
            role: object_property
            edge: held_by
            target_entity: Person
            typical_attributes:
            - manager
            - manager_id
            - advisor_id
      Trade:

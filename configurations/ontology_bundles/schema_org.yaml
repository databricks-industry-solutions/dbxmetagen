        keywords:
        - opportunity
        - deal
        - quote
        - pipeline
        - forecast
        - account
        - contact
        - order
        - invoice
        - line_item
        - product
        - price
      marketing:
        name: Marketing
        description: Campaigns, leads, attribution, digital marketing, and content
        keywords:
        - campaign
        - lead
        - attribution
        - email
        - segment
      support:
        name: Customer Support
        description: Tickets, cases, service requests, SLAs, and escalations
        keywords:
        - ticket
        - case
        - support
        - resolution
        - escalation
  technology:
    name: Technology
    description: IT infrastructure, security, monitoring, and application operations
    keywords:
    - server
    - security
    - log
    - monitoring
    - infrastructure
    subdomains:
      security:
        name: Security

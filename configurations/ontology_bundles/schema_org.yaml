        - monitoring
        - alert
        - log
        - uptime
        - incident
      infrastructure:
        name: Infrastructure
        description: Servers, networks, cloud resources, and configuration management
        keywords:
        - server
        - network
        - cloud
        - deployment
        - configuration
  governance:
    name: Governance
    description: Legal, regulatory compliance, contracts, data governance, and IP
    keywords:
    - compliance
    - contract
    - governance
    - policy
    - regulation

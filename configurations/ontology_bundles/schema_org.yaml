  metrics:
    auto_discover: false
    definitions: []

  validation:
    min_entity_confidence: 0.5
    max_entities_per_table: 3
    ai_validation_enabled: true
    classification_model: "databricks-claude-sonnet-4-6"

# Curated data domains for table classification.
# No published standard for data domains exists (unlike ontologies like Schema.org).
# These are aligned with the curated general.yaml bundle.
# Customers may customize these for their organization.
domains:
  finance:
    name: Finance
    description: Accounting, payments, revenue cycle, billing, and treasury
    keywords:
    - revenue
    - billing
    - ledger
    - payment
    - accounting
    - invoice
    - transaction
    - cost
    - budget
    subdomains:
      accounting:
        name: Accounting
        description: General ledger, journal entries, AP/AR, and financial statements
        keywords:
        - ledger
        - journal
        - gl
        - ap
        - ar
        - account
        - transaction
        - balance
      billing:
        name: Billing & Payments
        description: Billing, invoicing, payment processing, and charge capture
        keywords:
        - billing
        - payment
        - invoice
        - charge
        - receipt
      treasury:
        name: Treasury & Tax
        description: Cash management, banking, investments, tax, and compliance
        keywords:
        - treasury
        - cash
        - tax
        - investment
        - audit
  operations:
    name: Operations
    description: Supply chain, inventory, procurement, logistics, and facilities
    keywords:
    - inventory
    - procurement
    - logistics
    - warehouse
    - supply_chain
    - order
    - shipment
    - fulfillment
    subdomains:
      inventory:
        name: Inventory Management
        description: Stock levels, warehouse management, SKUs, and cycle counts
        keywords:
        - inventory
        - stock
        - warehouse
        - sku
        - cycle_count
      procurement:
        name: Procurement
        description: Purchasing, vendor management, contracts, and requisitions
        keywords:
        - procurement
        - vendor
        - purchase_order
        - supplier
        - rfp
      logistics:
        name: Logistics
        description: Shipping, transportation, delivery tracking, and route planning
        keywords:
        - shipping
        - delivery
        - carrier
        - freight
        - tracking
  workforce:
    name: Workforce
    description: HR, payroll, recruitment, and workforce management
    keywords:
    - employee
    - payroll
    - recruitment
    - hr
    - workforce
    subdomains:
      payroll_compensation:
        name: Payroll & Compensation
        description: Salaries, wages, bonuses, deductions, and tax withholding
        keywords:
        - payroll
        - salary
        - compensation
        - bonus
        - deduction
      talent:
        name: Talent Management
        description: Recruitment, hiring, performance reviews, and training
        keywords:
        - recruitment
        - candidate
        - performance
        - training
        - hiring
  customer:
    name: Customer
    description: CRM, sales, marketing, customer support, and product analytics
    keywords:
    - customer
    - sales
    - campaign
    - support
    - lead
    - account
    - contact
    - order
    - crm
    subdomains:
      sales:
        name: Sales & Pipeline

            cardinality: one-to-many
          part_of:
            target: Organization
            cardinality: many-to-one
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          name:
            kind: data_property
            role: label
            typical_attributes:
            - name
          type:
            kind: data_property
            role: label
            typical_attributes:
            - type
          address:
            kind: data_property
            role: label
            typical_attributes:
            - address
          parent_id:
            kind: object_property
            role: object_property
            typical_attributes:
            - parent_id
            edge: has_parent

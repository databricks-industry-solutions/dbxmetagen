# Retail & Consumer Packaged Goods Ontology Bundle

metadata:
  name: "Retail & CPG"
  version: "2.0"
  industry: "retail_cpg"
  description: "Retail, e-commerce, and CPG ontology with customer, product, and supply chain entity types"
  standards_alignment: "GS1, Schema.org"

ontology:
  version: "2.0"
  name: "Retail & CPG Business Ontology"
  description: "Entity types for retail operations, e-commerce, merchandising, and supply chain"

  entities:
    auto_discover: true
    discovery_confidence_threshold: 0.4

    definitions:
      # General entities
      Person:
        description: "People, customers, contacts, users, or employees"
        keywords: ["customer", "employee", "user", "contact", "person", "shopper", "member"]
        typical_attributes: [id, name, email, phone, address, created_date]
      Organization:
        description: "Companies, departments, facilities, or business units"
        keywords: ["company", "organization", "department", "facility", "tenant", "brand"]
        typical_attributes: [id, name, type, address, parent_id]
      Transaction:
        description: "Orders, purchases, payments, invoices, or financial events"
        keywords: ["transaction", "order", "payment", "invoice", "purchase", "sale", "receipt"]
        typical_attributes: [id, customer_id, amount, date, status, currency]
      Location:
        description: "Addresses, sites, regions, facilities, or geographies"
        keywords: ["location", "address", "site", "region", "facility"]
        typical_attributes: [id, name, address, city, state, country, zip_code]
      Event:
        description: "Activities, logs, sessions, audits, or system events"
        keywords: ["event", "activity", "log", "audit", "session", "click", "pageview"]
        typical_attributes: [id, type, timestamp, user_id, details]
      Reference:
        description: "Lookup tables, codes, categories, dimensions, or configuration"
        keywords: ["reference", "lookup", "code", "category", "dim_"]
        typical_attributes: [id, code, name, description, active]
      Metric:
        description: "KPIs, aggregates, facts, summaries, or analytic measures"
        keywords: ["metric", "kpi", "aggregate", "fact_", "summary"]
        typical_attributes: [id, name, value, period, dimension]
      Document:
        description: "Unstructured content, notes, files, or text records"
        keywords: ["document", "note", "file", "content", "text"]
        typical_attributes: [id, title, body, author, created_date, type]

      # Retail & CPG entities
      Customer:
        description: "Retail customers, loyalty members, or shoppers"
        keywords: ["customer", "shopper", "member", "loyalty", "buyer", "consumer", "subscriber"]
        typical_attributes: [id, name, email, loyalty_tier, lifetime_value, segment, first_purchase_date]
      Product:
        description: "Retail products, SKUs, items, or merchandise"
        keywords: ["product", "item", "sku", "merchandise", "upc", "gtin", "ean", "asin"]
        typical_attributes: [id, sku, name, category, brand, price, weight, upc]
      Order:
        description: "Customer orders, carts, baskets, or purchase transactions"
        keywords: ["order", "cart", "basket", "checkout", "purchase_order", "sales_order"]
        typical_attributes: [id, customer_id, total, status, channel, placed_date, shipped_date]
      Store:
        description: "Physical retail stores, outlets, warehouses, or distribution centers"
        keywords: ["store", "outlet", "shop", "warehouse", "dc", "distribution_center", "fulfillment"]
        typical_attributes: [id, name, type, address, region, format, open_date]
      Promotion:
        description: "Promotions, discounts, coupons, campaigns, or markdown events"
        keywords: ["promotion", "discount", "coupon", "markdown", "deal", "offer", "promo"]
        typical_attributes: [id, name, type, discount_value, start_date, end_date, channel]
      Supplier:
        description: "Vendors, manufacturers, distributors, or trading partners"
        keywords: ["supplier", "vendor", "manufacturer", "distributor", "wholesaler"]
        typical_attributes: [id, name, type, lead_time, country, payment_terms]
      Inventory:
        description: "Stock levels, warehouse inventory, or on-hand quantities"
        keywords: ["inventory", "stock", "on_hand", "available", "reserved", "reorder"]
        typical_attributes: [id, sku, location_id, quantity, reserved, reorder_point]
      Return:
        description: "Product returns, refunds, exchanges, or RMA records"
        keywords: ["return", "refund", "exchange", "rma", "reversal"]
        typical_attributes: [id, order_id, reason, amount, status, date]
      Shipment:
        description: "Shipping, delivery, fulfillment, or logistics records"
        keywords: ["shipment", "delivery", "tracking", "carrier", "fulfillment", "package"]
        typical_attributes: [id, order_id, carrier, tracking_number, status, ship_date, delivery_date]
      Category:
        description: "Product categories, departments, or merchandise hierarchies"
        keywords: ["category", "department", "hierarchy", "classification", "taxonomy", "assortment"]
        typical_attributes: [id, name, parent_id, level, path]

  domain_entity_affinity:
    merchandising: [Product, Category, Promotion, Supplier, Metric, Reference]
    ecommerce: [Customer, Order, Product, Promotion, Event, Shipment, Return, Metric]
    store_operations: [Store, Inventory, Person, Event, Metric, Location, Reference]
    supply_chain: [Supplier, Inventory, Shipment, Product, Store, Organization, Location]
    customer_engagement: [Customer, Promotion, Order, Event, Metric, Person]
    marketing: [Customer, Promotion, Event, Metric, Reference, Product]
    finance: [Transaction, Order, Metric, Reference, Organization, Event]
    operations: [Inventory, Store, Shipment, Organization, Location, Event, Metric, Reference]
    workforce: [Person, Organization, Location, Event, Reference, Store]
    customer: [Customer, Person, Order, Product, Transaction, Event, Metric, Location]
    technology: [Event, Metric, Reference, Organization]
    governance: [Document, Reference, Organization, Person]

  relationships:
    types:
      - name: owns
        description: "Entity owns or is responsible for another"
        inverse: owned_by
      - name: contains
        description: "Entity contains or includes another"
        inverse: contained_in
      - name: references
        description: "Entity references another (foreign key)"
        inverse: referenced_by
      - name: derives_from
        description: "Entity is derived from another (lineage)"
        inverse: source_of
      - name: similar_to
        description: "Entity is semantically similar to another"
        inverse: similar_to
        symmetric: true
      - name: part_of
        description: "Entity is part of a larger entity"
        inverse: has_part
      - name: instance_of
        description: "Entity is an instance of a type"
        inverse: type_of
      - name: supplies
        description: "Supplier supplies a product"
        inverse: supplied_by
      - name: purchased_at
        description: "Order was placed at a store or channel"
        inverse: sold

  metrics:
    auto_discover: false
    definitions: []

  validation:
    min_entity_confidence: 0.5
    max_entities_per_table: 3
    ai_validation_enabled: true
    classification_model: "databricks-claude-sonnet-4-6"


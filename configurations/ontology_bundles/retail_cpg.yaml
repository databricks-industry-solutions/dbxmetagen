metadata:
  name: Retail & CPG
  version: '3.0'
  format_version: '2.0'
  industry: retail_cpg
  description: Retail, e-commerce, and CPG ontology with customer, product, and supply chain entity types
  standards_alignment: GS1, Schema.org
ontology:
  version: '3.0'
  name: Retail & CPG Business Ontology
  description: Entity types for retail operations, e-commerce, merchandising, and supply chain
  property_roles:
    primary_key:
      description: Surrogate or technical row identifier
      maps_to_kind: data_property
      semantic_role: identifier
    business_key:
      description: Natural key meaningful to users (MRN, NPI)
      maps_to_kind: data_property
      semantic_role: identifier
    object_property:
      description: FK or reference to another entity's identifier
      maps_to_kind: object_property
      semantic_role: relationship
    measure:
      description: Numeric value to aggregate
      maps_to_kind: data_property
      semantic_role: metric
    dimension:
      description: Categorical filter or grouping attribute
      maps_to_kind: data_property
      semantic_role: dimension
    temporal:
      description: Date or timestamp of event
      maps_to_kind: data_property
      semantic_role: temporal
    geographic:
      description: Location-based dimension (country, city, region, coordinates)
      maps_to_kind: data_property
      semantic_role: geographic
    label:
      description: Human-readable name or title
      maps_to_kind: data_property
      semantic_role: label
    audit:
      description: System-generated provenance column
      maps_to_kind: data_property
      semantic_role: provenance
    derived:
      description: Computed from other columns
      maps_to_kind: data_property
      semantic_role: derived
    composite_component:
      description: Part of a multi-column value object
      maps_to_kind: data_property
      semantic_role: component
  edge_catalog:
    instance_of:
      inverse: type_of
      symmetric: false
      category: structural
    subclass_of:
      inverse: superclass_of
      symmetric: false
      category: structural
    has_part:
      inverse: part_of
      symmetric: false
      category: structural
    contains:
      inverse: contained_in
      symmetric: false
      category: structural
    member_of:
      inverse: has_member
      symmetric: false
      category: structural
    purchased_by:
      inverse: purchased
      domain: Transaction
      range: Customer
      symmetric: false
      category: business
    sold_at:
      inverse: sells
      domain: Transaction
      range: Store
      symmetric: false
      category: business
    in_category:
      inverse: categorizes
      domain: Product
      range: Reference
      symmetric: false
      category: business
    supplied_by:
      inverse: supplies
      domain: Product
      range: Supplier
      symmetric: false
      category: business
    placed_by:
      inverse: placed
      domain: Transaction
      range: Person
      symmetric: false
      category: business
    created_by:
      inverse: created
      domain: Any
      range: Person
      symmetric: false
      category: business
    owned_by:
      inverse: owns
      domain: Any
      range:
      - Person
      - Organization
      symmetric: false
      category: business
    references:
      inverse: referenced_by
      domain: Any
      range: Any
      symmetric: false
      category: business
    located_at:
      inverse: location_of
      domain: Any
      range: Location
      symmetric: false
      category: business
    derives_from:
      inverse: source_of
      symmetric: false
      category: lineage
    same_as:
      symmetric: true
      category: semantic
    similar_to:
      symmetric: true
      category: semantic
  entities:
    auto_discover: true
    discovery_confidence_threshold: 0.4
    definitions:
      Person:
        description: People, customers, contacts, users, or employees
        uri: https://schema.org/Person
        source_ontology: schema.org
        keywords:
        - customer
        - employee
        - user
        - contact
        - person
        - shopper
        - member
        typical_attributes:
        - id
        - name
        - email
        - phone
        - address
        - created_date
        relationships:
          part_of:
            target: Organization
            cardinality: many-to-one
        properties:
          id:
            kind: data_property
            role: primary_key
            typical_attributes:
            - id
          name:
            kind: data_property
            role: label
            typical_attributes:
            - name
          email:
            kind: data_property
            role: label
            typical_attributes:
            - email
          phone:
            kind: data_property
            role: label
            typical_attributes:
            - phone
          address:
            kind: data_property
            role: label
            typical_attributes:
            - address
          created_date:
            kind: data_property
            role: temporal
            typical_attributes:
            - created_date
      Organization:
        description: Companies, departments, facilities, or business units
        uri: https://schema.org/Organization
        source_ontology: schema.org

Geographic:
  description: Any column or table representing a physical location, address component,
    or geographic area
  source_ontology: custom
  uri: urn:dbxmetagen:geo_doj:Geographic
  keywords:
  - address
  - addr
  - location
  - place
  - geo
  - geolocation
  - geography
  - spatial
  - map
  - locale
  - site
  - venue
  synonyms:
  - geographic
  - locational
  - positional
  - spatial
  typical_attributes:
  - address
  - city
  - state
  - country
  - zip_code
  - postal_code
  - region
  - county
  - latitude
  - longitude
  - fips_code
  - location
  - place
  - territory
  business_questions: []
  relationships:
    contains:
      target: Address
      cardinality: one-to-many
    has_coordinates:
      target: GeoCoordinate
      cardinality: one-to-many
    in_region:
      target: AdminRegion
      cardinality: many-to-one
  properties: {}

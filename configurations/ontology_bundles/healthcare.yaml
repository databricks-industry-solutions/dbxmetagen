# Healthcare & Life Sciences Ontology Bundle
# Curated business-level entities informed by FHIR R4 and OMOP CDM

metadata:
  name: "Healthcare & Life Sciences"
  version: "3.0"
  format_version: "2.0"
  industry: "healthcare"
  description: "Curated healthcare ontology covering clinical, payer, pharma, and cross-functional domains with ~30 business-level entity types"
  standards_alignment: "Informed by FHIR R4 and OMOP CDM"

ontology:
  version: "3.0"
  name: "Healthcare Business Ontology"
  description: "Healthcare-focused ontology for data catalog metadata"

  property_roles:
    primary_key:
      description: "Surrogate or technical row identifier"
      maps_to_kind: "data_property"
      semantic_role: "identifier"
    business_key:
      description: "Natural key meaningful to users (MRN, NPI)"
      maps_to_kind: "data_property"
      semantic_role: "identifier"
    measure:
      description: "Numeric value to aggregate"
      maps_to_kind: "data_property"
      semantic_role: "metric"
    dimension:
      description: "Categorical filter or grouping attribute"
      maps_to_kind: "data_property"
      semantic_role: "dimension"
    temporal:
      description: "Date or timestamp of event"
      maps_to_kind: "data_property"
      semantic_role: "temporal"
    geographic:
      description: "Location-based dimension (country, city, region, coordinates)"
      maps_to_kind: "data_property"
      semantic_role: "geographic"
    object_property:
      description: "FK or reference to another entity's identifier"
      maps_to_kind: "object_property"
      semantic_role: "relationship"
    composite_component:
      description: "Part of a multi-column value object"
      maps_to_kind: "data_property"
      semantic_role: "component"
    label:
      description: "Human-readable name or title"
      maps_to_kind: "data_property"
      semantic_role: "label"
    pii:
      description: "Personally identifiable information"
      maps_to_kind: "data_property"
      semantic_role: "pii"
      governance_flag: true
    audit:
      description: "System-generated provenance column"
      maps_to_kind: "data_property"
      semantic_role: "provenance"
    derived:
      description: "Computed from other columns"
      maps_to_kind: "data_property"
      semantic_role: "derived"

  edge_catalog:
    instance_of: { inverse: type_of, symmetric: false, category: structural }
    subclass_of: { inverse: superclass_of, symmetric: false, category: structural }
    has_part: { inverse: part_of, symmetric: false, category: structural }
    contains: { inverse: contained_in, symmetric: false, category: structural }
    member_of: { inverse: has_member, symmetric: false, category: structural }
    # Healthcare business edges
    treated_by: { inverse: treats, domain: Patient, range: Provider, symmetric: false, category: business }
    treats: { inverse: treated_by, domain: Provider, range: Patient, symmetric: false, category: business }
    has_encounter: { inverse: encounter_for, domain: Patient, range: Encounter, symmetric: false, category: business }
    has_condition: { inverse: condition_of, domain: Patient, range: Condition, symmetric: false, category: business }
    has_coverage: { inverse: covers, domain: Patient, range: Coverage, symmetric: false, category: business }
    ordered_for: { inverse: has_order, domain: [Procedure, Medication], range: Encounter, symmetric: false, category: business }
    performed_by: { inverse: performs, domain: Procedure, range: Provider, symmetric: false, category: business }
    prescribed_to: { inverse: has_prescription, domain: Medication, range: Patient, symmetric: false, category: business }
    diagnosed_in: { inverse: has_diagnosis, domain: Condition, range: Encounter, symmetric: false, category: business }
    for_encounter: { inverse: encounter_claim, domain: Claim, range: Encounter, symmetric: false, category: business }
    covered_by: { inverse: covers_claim, domain: Claim, range: Coverage, symmetric: false, category: business }
    located_at: { inverse: location_of, domain: Any, range: Location, symmetric: false, category: business }
    references: { inverse: referenced_by, domain: Any, range: Any, symmetric: false, category: business }
    # Trial / research edges
    enrolled_in: { inverse: enrolls, domain: Patient, range: ClinicalTrial, symmetric: false, category: business }
    collected_from: { inverse: provides_specimen, domain: Specimen, range: Patient, symmetric: false, category: business }
    performed_at: { inverse: hosts, domain: [Encounter, Procedure], range: Facility, symmetric: false, category: business }
    consented_by: { inverse: consents_to, domain: Consent, range: Patient, symmetric: false, category: business }
    uses_device: { inverse: used_in, domain: [Procedure, Encounter], range: Device, symmetric: false, category: business }
    tested_in: { inverse: has_result, domain: LabResult, range: Specimen, symmetric: false, category: business }
    paid_by: { inverse: pays_for, domain: Claim, range: Payer, symmetric: false, category: business }
    # General business edges
    placed_by: { inverse: placed, domain: Transaction, range: Person, symmetric: false, category: business }
    created_by: { inverse: created, domain: Any, range: Person, symmetric: false, category: business }
    owned_by: { inverse: owns, domain: Any, range: [Person, Organization], symmetric: false, category: business }
    # Lineage
    derives_from: { inverse: source_of, symmetric: false, category: lineage }
    recorded_in: { inverse: records, symmetric: false, category: lineage }
    # Semantic
    same_as: { symmetric: true, category: semantic }
    similar_to: { symmetric: true, category: semantic }

  entities:
    auto_discover: true
    discovery_confidence_threshold: 0.4

    definitions:
      # General entities
      Person:
        description: "People, customers, contacts, users, or employees"
        uri: "https://schema.org/Person"
        source_ontology: "schema.org"
        keywords: ["customer", "employee", "user", "contact", "person"]
        synonyms: ["individual", "member", "staff", "personnel"]
        typical_attributes: [id, name, email, phone, address, created_date]
        business_questions:
          - "How many active users do we have?"
          - "What is the breakdown of employees by department?"
        relationships:
          owns: { target: Transaction, cardinality: "one-to-many" }
          part_of: { target: Organization, cardinality: "many-to-one" }
      Organization:
        description: "Companies, departments, facilities, or business units"
        uri: "https://schema.org/Organization"
        source_ontology: "schema.org"
        keywords: ["company", "organization", "department", "facility", "tenant"]
        synonyms: ["enterprise", "agency", "institution", "firm"]
        typical_attributes: [id, name, type, address, parent_id]
        business_questions:
          - "How many facilities do we operate?"
          - "What is the revenue by business unit?"
        relationships:
          contains: { target: Person, cardinality: "one-to-many" }
          contains_location: { target: Location, cardinality: "one-to-many" }
          part_of: { target: Organization, cardinality: "many-to-one" }
      Product:
        description: "Goods, services, SKUs, or catalog items"
        uri: "https://schema.org/Product"
        source_ontology: "schema.org"
        keywords: ["product", "item", "sku", "catalog", "offering"]
        typical_attributes: [id, name, description, price, category, status]
        relationships:
          references: { target: Reference, cardinality: "many-to-one" }
      Transaction:
        description: "Orders, purchases, payments, invoices, or financial events"
        uri: "https://schema.org/Invoice"
        source_ontology: "schema.org"
        keywords: ["transaction", "order", "payment", "invoice", "purchase"]
        typical_attributes: [id, customer_id, amount, date, status, currency]
        relationships:
          references: { target: Person, cardinality: "many-to-one" }
      Location:
        description: "Addresses, sites, regions, facilities, or geographies"
        uri: "https://schema.org/Place"
        source_ontology: "schema.org"
        keywords: ["location", "address", "site", "region", "facility"]
        typical_attributes: [id, name, address, city, state, country, zip_code]
        relationships:
          part_of: { target: Organization, cardinality: "many-to-one" }
      Event:
        description: "Activities, logs, sessions, audits, or system events"
        uri: "https://schema.org/Event"
        source_ontology: "schema.org"
        keywords: ["event", "activity", "log", "audit", "session"]
        typical_attributes: [id, type, timestamp, user_id, details]
        relationships:
          references: { target: Person, cardinality: "many-to-one" }
      Reference:
        description: "Lookup tables, codes, categories, dimensions, or configuration"
        uri: "https://schema.org/Thing"
        source_ontology: "schema.org"
        keywords: ["reference", "lookup", "code", "category", "dim_"]
        typical_attributes: [id, code, name, description, active]
        relationships: {}
      Metric:
        description: "KPIs, aggregates, facts, summaries, or analytic measures"
        uri: "https://schema.org/QuantitativeValue"
        source_ontology: "schema.org"
        keywords: ["metric", "kpi", "aggregate", "fact_", "summary"]
        typical_attributes: [id, name, value, period, dimension]
        relationships:
          derives_from: { target: Event, cardinality: "many-to-one" }
      Document:
        description: "Unstructured content, notes, files, or text records"
        uri: "https://schema.org/DigitalDocument"
        source_ontology: "schema.org"
        keywords: ["document", "note", "file", "content", "text"]
        typical_attributes: [id, title, body, author, created_date, type]
        relationships:
          references: { target: Person, cardinality: "many-to-one" }

      # Healthcare / Life Sciences entities (FHIR R4 aligned)
      Patient:
        description: "Individuals receiving healthcare services (FHIR Patient)"
        uri: "http://hl7.org/fhir/StructureDefinition/Patient"
        source_ontology: "FHIR_R4"
        parent: Person
        keywords: ["patient", "mrn", "subject", "participant", "beneficiary"]
        synonyms: ["member", "enrollee", "client", "individual"]
        typical_attributes: [id, mrn, name, dob, gender, address]
        business_questions:
          - "How many patients were admitted last month?"
          - "What is the average length of stay by department?"
          - "Which patients have been readmitted within 30 days?"
        relationships:
          treated_by: { target: Provider, cardinality: "many-to-many" }
          has_encounter: { target: Encounter, cardinality: "one-to-many", join_path: "patient.patient_id = encounter.patient_id" }
          has_condition: { target: Condition, cardinality: "one-to-many", join_path: "patient.patient_id = condition.patient_id" }
          has_coverage: { target: Coverage, cardinality: "one-to-many", join_path: "patient.patient_id = coverage.member_id" }
        properties:
          identifier:
            kind: data_property
            role: primary_key
            typical_attributes: ["id", "patient_id", "pat_id"]
          mrn:
            kind: data_property
            role: business_key
            typical_attributes: ["mrn", "medical_record_number", "patient_mrn"]
          name:
            kind: data_property
            role: pii
            typical_attributes: ["name", "full_name", "first_name", "last_name", "patient_name"]
          dob:
            kind: data_property
            role: pii
            typical_attributes: ["dob", "date_of_birth", "birth_date", "birthdate"]
          gender:
            kind: data_property
            role: dimension
            typical_attributes: ["gender", "sex", "gender_code"]
          treated_by:
            kind: object_property
            role: object_property
            edge: treated_by
            target_entity: Provider
            typical_attributes: ["provider_id", "attending_id", "physician_id", "pcp_id"]
      Provider:
        description: "Practitioners, clinicians, or care team members (FHIR Practitioner)"
        uri: "http://hl7.org/fhir/StructureDefinition/Practitioner"
        source_ontology: "FHIR_R4"
        parent: Person
        keywords: ["provider", "physician", "practitioner", "clinician", "npi"]
        synonyms: ["doctor", "nurse", "specialist", "attending", "caregiver"]
        typical_attributes: [id, npi, name, specialty, organization]
        business_questions:
          - "Which providers have the highest patient volume?"
          - "What is the distribution of providers by specialty?"
        relationships:
          treats: { target: Patient, cardinality: "many-to-many" }
          ordered_for: { target: Encounter, cardinality: "one-to-many" }
          part_of: { target: Organization, cardinality: "many-to-one" }
      Encounter:
        description: "Visits, admissions, or episodes of care (FHIR Encounter)"
        uri: "http://hl7.org/fhir/StructureDefinition/Encounter"
        source_ontology: "FHIR_R4"
        parent: Event
        keywords: ["encounter", "visit", "admission", "episode", "appointment"]
        synonyms: ["stay", "hospitalization", "consult", "session"]
        typical_attributes: [id, patient_id, date, type, provider_id, location_id, status]
        business_questions:
          - "What is the average ED wait time by hospital?"
          - "How many admissions occurred this quarter?"
          - "What is the readmission rate by discharge disposition?"
        relationships:
          references: { target: Patient, cardinality: "many-to-one", join_path: "encounter.patient_id = patient.patient_id" }
          has_order: { target: Procedure, cardinality: "one-to-many", join_path: "encounter.encounter_id = procedure.encounter_id" }
          contains: { target: Observation, cardinality: "one-to-many", join_path: "encounter.encounter_id = observation.encounter_id" }
          located_at: { target: Location, cardinality: "many-to-one", join_path: "encounter.location_id = location.location_id" }
        properties:
          identifier:
            kind: data_property
            role: primary_key
            typical_attributes: ["id", "encounter_id", "visit_id", "admission_id"]
          patient:
            kind: object_property
            role: object_property
            edge: has_encounter
            target_entity: Patient
            typical_attributes: ["patient_id", "pat_id", "subject_id"]
          provider:
            kind: object_property
            role: object_property
            edge: performed_by
            target_entity: Provider
            typical_attributes: ["provider_id", "attending_id", "physician_id"]
          location:
            kind: object_property
            role: object_property
            edge: located_at
            target_entity: Location
            typical_attributes: ["location_id", "facility_id", "department_id"]
          encounter_date:
            kind: data_property
            role: temporal
            typical_attributes: ["date", "encounter_date", "admission_date", "visit_date", "start_date"]
          encounter_type:
            kind: data_property
            role: dimension
            typical_attributes: ["type", "encounter_type", "visit_type", "class"]
          status:
            kind: data_property
            role: dimension
            typical_attributes: ["status", "encounter_status", "discharge_disposition"]
      Condition:
        description: "Diagnoses, problems, or diseases (FHIR Condition / OMOP CONDITION_OCCURRENCE)"
        uri: "http://hl7.org/fhir/StructureDefinition/Condition"
        source_ontology: "FHIR_R4"
        keywords: ["diagnosis", "condition", "icd", "disease", "problem"]
        typical_attributes: [id, code, description, patient_id, encounter_id, date, status]
        relationships:
          references: { target: Patient, cardinality: "many-to-one" }
          diagnosed_in: { target: Encounter, cardinality: "many-to-one" }
      Procedure:
        description: "Medical procedures, surgeries, or interventions (FHIR Procedure)"
        uri: "http://hl7.org/fhir/StructureDefinition/Procedure"
        source_ontology: "FHIR_R4"
        keywords: ["procedure", "surgery", "cpt", "intervention", "operation"]
        typical_attributes: [id, code, description, date, provider_id, encounter_id, status]
        relationships:
          ordered_for: { target: Encounter, cardinality: "many-to-one" }
          performed_by: { target: Provider, cardinality: "many-to-one" }
          references: { target: Patient, cardinality: "many-to-one" }
      Medication:
        description: "Drugs, prescriptions, or medication orders (FHIR MedicationRequest)"
        uri: "http://hl7.org/fhir/StructureDefinition/Medication"
        source_ontology: "FHIR_R4"
        parent: Product
        keywords: ["medication", "drug", "prescription", "pharmacy", "ndc", "rxnorm"]
        typical_attributes: [id, name, ndc, dose, frequency, route]
        relationships:
          ordered_for: { target: Encounter, cardinality: "many-to-one" }
          prescribed_to: { target: Patient, cardinality: "many-to-one" }
      Observation:
        description: "Lab results, vitals, or clinical measurements (FHIR Observation / OMOP MEASUREMENT)"
        uri: "http://hl7.org/fhir/StructureDefinition/Observation"
        source_ontology: "FHIR_R4"
        parent: Event
        keywords: ["lab", "result", "observation", "vital", "specimen", "measurement"]
        typical_attributes: [id, test_code, value, unit, reference_range, date]
        relationships:
          references: { target: Patient, cardinality: "many-to-one" }
          recorded_in: { target: Encounter, cardinality: "many-to-one" }
      Claim:
        description: "Insurance claims or billing submissions (FHIR Claim)"
        uri: "http://hl7.org/fhir/StructureDefinition/Claim"
        source_ontology: "FHIR_R4"
        parent: Transaction
        keywords: ["claim", "billing", "adjudication", "remittance", "eob"]
        typical_attributes: [id, patient_id, amount, service_date, status, payer_id]
        relationships:
          references: { target: Patient, cardinality: "many-to-one" }
          for_encounter: { target: Encounter, cardinality: "many-to-one" }
          covered_by: { target: Coverage, cardinality: "many-to-one" }
        properties:
          identifier:
            kind: data_property
            role: primary_key
            typical_attributes: ["id", "claim_id", "claim_number"]
          patient:
            kind: object_property
            role: object_property
            edge: references
            target_entity: Patient
            typical_attributes: ["patient_id", "member_id", "subscriber_id"]
          amount:
            kind: data_property
            role: measure
            typical_attributes: ["amount", "total_charge", "billed_amount", "paid_amount", "allowed_amount"]
          service_date:
            kind: data_property
            role: temporal
            typical_attributes: ["service_date", "claim_date", "date_of_service", "from_date"]
          status:
            kind: data_property
            role: dimension
            typical_attributes: ["status", "claim_status", "adjudication_status"]
          encounter:
            kind: object_property
            role: object_property
            edge: for_encounter
            target_entity: Encounter
            typical_attributes: ["encounter_id", "visit_id"]
          payer:
            kind: object_property
            role: object_property
            edge: covered_by
            target_entity: Coverage
            typical_attributes: ["payer_id", "plan_id", "coverage_id", "insurance_id"]
      Coverage:
        description: "Insurance plans, benefits, or member coverage (FHIR Coverage)"
        uri: "http://hl7.org/fhir/StructureDefinition/Coverage"
        source_ontology: "FHIR_R4"
        keywords: ["coverage", "insurance", "benefit", "plan", "enrollment"]
        typical_attributes: [id, member_id, payer, plan_name, start_date, end_date]
        relationships:
          references: { target: Person, cardinality: "many-to-one" }
          provided_by: { target: Organization, cardinality: "many-to-one" }
      DiagnosticReport:
        description: "Lab reports, pathology reports, or imaging study results (FHIR DiagnosticReport)"
        uri: "http://hl7.org/fhir/StructureDefinition/DiagnosticReport"
        source_ontology: "FHIR_R4"
        parent: Document
        keywords: ["diagnostic_report", "lab_report", "pathology_report", "report", "study_result"]
        typical_attributes: [id, patient_id, encounter_id, status, issued_date, category, code]
        relationships:
          references: { target: Patient, cardinality: "many-to-one" }
          for_encounter: { target: Encounter, cardinality: "many-to-one" }
          contains: { target: Observation, cardinality: "one-to-many" }
      Immunization:
        description: "Vaccination events and immunization records (FHIR Immunization)"
        uri: "http://hl7.org/fhir/StructureDefinition/Immunization"
        source_ontology: "FHIR_R4"
        parent: Event
        keywords: ["immunization", "vaccination", "vaccine", "immunization_record", "shot"]
        typical_attributes: [id, patient_id, vaccine_code, date, dose_number, status, site]
        relationships:
          references: { target: Patient, cardinality: "many-to-one" }
      AllergyIntolerance:
        description: "Allergy and intolerance records (FHIR AllergyIntolerance)"
        uri: "http://hl7.org/fhir/StructureDefinition/AllergyIntolerance"
        source_ontology: "FHIR_R4"
        keywords: ["allergy", "intolerance", "allergen", "adverse_reaction", "sensitivity"]
        typical_attributes: [id, patient_id, code, type, category, criticality, onset_date]
        relationships:
          references: { target: Patient, cardinality: "many-to-one" }
      CarePlan:
        description: "Care plans, treatment protocols, and goals (FHIR CarePlan)"
        uri: "http://hl7.org/fhir/StructureDefinition/CarePlan"
        source_ontology: "FHIR_R4"
        parent: Document
        keywords: ["care_plan", "treatment_plan", "protocol", "goal", "care_team"]
        typical_attributes: [id, patient_id, status, intent, period_start, period_end, category]
        relationships:
          references: { target: Patient, cardinality: "many-to-one" }
          contains: { target: Procedure, cardinality: "one-to-many" }
      ClinicalTrial:
        description: "Clinical trials, research studies, and investigational protocols"
        uri: "http://hl7.org/fhir/StructureDefinition/ResearchStudy"
        source_ontology: "FHIR_R4"
        keywords: ["clinical_trial", "trial", "study", "research_study", "protocol", "investigational"]
        synonyms: ["research_study", "investigation", "trial_protocol"]
        typical_attributes: [id, title, status, phase, sponsor, start_date, end_date, indication, therapeutic_area]
        business_questions:
          - "How many active trials are in each phase?"
          - "Which therapeutic areas have the most enrolled patients?"
        relationships:
          enrolls: { target: Patient, cardinality: "one-to-many" }
          references: { target: Organization, cardinality: "many-to-one" }
      Device:
        description: "Medical devices, equipment, implants, and instruments"
        uri: "http://hl7.org/fhir/StructureDefinition/Device"
        source_ontology: "FHIR_R4"
        keywords: ["device", "equipment", "implant", "instrument", "medical_device", "udi"]
        synonyms: ["medical_equipment", "apparatus", "implantable"]
        typical_attributes: [id, type, manufacturer, model, serial_number, status, udi]
        relationships:
          used_in: { target: Procedure, cardinality: "many-to-many" }
          owned_by: { target: Organization, cardinality: "many-to-one" }
      Specimen:
        description: "Laboratory specimens, biological samples, and biobank collections"
        uri: "http://hl7.org/fhir/StructureDefinition/Specimen"
        source_ontology: "FHIR_R4"
        keywords: ["specimen", "sample", "biopsy", "biobank", "collection", "tissue"]
        synonyms: ["biological_sample", "lab_sample", "biospecimen"]
        typical_attributes: [id, type, patient_id, collection_date, status, body_site, container]
        relationships:
          collected_from: { target: Patient, cardinality: "many-to-one" }
          references: { target: Encounter, cardinality: "many-to-one" }
      Payer:
        description: "Insurance companies, health plans, government payers, and third-party administrators"
        keywords: ["payer", "insurer", "health_plan", "insurance", "tpa", "medicare", "medicaid"]
        synonyms: ["insurance_company", "health_insurer", "plan_sponsor"]
        parent: Organization
        typical_attributes: [id, name, type, plan_type, network, coverage_area, cms_id]
        business_questions:
          - "What is the claim volume by payer?"
          - "Which payers have the highest denial rates?"
        relationships:
          pays_for: { target: Claim, cardinality: "one-to-many" }
          covers: { target: Patient, cardinality: "one-to-many" }
      Practitioner:
        description: "Individual clinicians, physicians, nurses, and allied health professionals"
        uri: "http://hl7.org/fhir/StructureDefinition/Practitioner"
        source_ontology: "FHIR_R4"
        parent: Person
        keywords: ["practitioner", "physician", "nurse", "clinician", "therapist", "npi"]
        synonyms: ["doctor", "healthcare_worker", "provider_individual"]
        typical_attributes: [id, name, npi, specialty, qualification, active, gender]
        relationships:
          performs: { target: Procedure, cardinality: "one-to-many" }
          part_of: { target: Organization, cardinality: "many-to-one" }
      Facility:
        description: "Hospitals, clinics, labs, pharmacies, and care sites"
        uri: "http://hl7.org/fhir/StructureDefinition/Location"
        source_ontology: "FHIR_R4"
        parent: Location
        keywords: ["facility", "hospital", "clinic", "lab", "pharmacy", "care_site", "campus"]
        synonyms: ["healthcare_facility", "medical_center", "care_location"]
        typical_attributes: [id, name, type, address, status, managing_org_id, bed_count]
        business_questions:
          - "How many encounters per facility?"
          - "What is the utilization rate by facility type?"
        relationships:
          hosts: { target: Encounter, cardinality: "one-to-many" }
          part_of: { target: Organization, cardinality: "many-to-one" }
      LabResult:
        description: "Laboratory test results, panels, and diagnostic measurements"
        parent: Observation
        keywords: ["lab_result", "lab_test", "panel", "assay", "analyte", "cbc", "cmp"]
        synonyms: ["laboratory_result", "test_result", "lab_value"]
        typical_attributes: [id, patient_id, test_code, test_name, value, unit, reference_range, status, date]
        relationships:
          tested_in: { target: Specimen, cardinality: "many-to-one" }
          references: { target: Patient, cardinality: "many-to-one" }
      Consent:
        description: "Patient consent records, authorizations, and IRB approvals"
        uri: "http://hl7.org/fhir/StructureDefinition/Consent"
        source_ontology: "FHIR_R4"
        keywords: ["consent", "authorization", "irb", "informed_consent", "hipaa_authorization"]
        synonyms: ["patient_consent", "research_consent", "data_sharing_agreement"]
        typical_attributes: [id, patient_id, status, scope, category, date_time, period_start, period_end]
        relationships:
          consented_by: { target: Patient, cardinality: "many-to-one" }
          references: { target: Organization, cardinality: "many-to-one" }

  domain_entity_affinity:
    clinical:
      [
        Patient, Provider, Practitioner, Encounter, Condition, Procedure, Medication,
        Observation, Claim, Coverage, Person, Organization, Location, Facility,
        DiagnosticReport, Immunization, AllergyIntolerance, CarePlan, Device, LabResult,
      ]
    diagnostics: [Patient, Observation, Condition, Procedure, DiagnosticReport, LabResult, Specimen, Person, Reference, Device]
    payer: [Claim, Coverage, Payer, Person, Organization, Transaction, Reference]
    pharmaceutical:
      [
        Patient, Observation, Medication, Condition, Procedure, ClinicalTrial,
        Person, Document, Reference, Organization, Immunization, Consent,
      ]
    quality_safety: [Patient, Observation, Encounter, Condition, Metric, Event, CarePlan, Consent]
    research:
      [
        Patient, Observation, Medication, Condition, Procedure, ClinicalTrial,
        Person, Document, Reference, DiagnosticReport, Specimen, Consent,
      ]
    finance:
      [Transaction, Person, Organization, Product, Reference, Event, Metric, Payer]
    operations: [Product, Organization, Location, Facility, Event, Metric, Reference, Device]
    workforce: [Person, Practitioner, Organization, Location, Facility, Event, Reference]
    customer:
      [Person, Organization, Product, Transaction, Event, Metric, Location]
    technology: [Event, Metric, Reference, Organization, Device]
    governance: [Document, Reference, Organization, Person, Consent]

  relationships:
    types:
      - name: owns
        description: "Entity owns or is responsible for another"
        inverse: owned_by
      - name: contains
        description: "Entity contains or includes another"
        inverse: contained_in
      - name: references
        description: "Entity references another (foreign key)"
        inverse: referenced_by
      - name: derives_from
        description: "Entity is derived from another (lineage)"
        inverse: source_of
      - name: similar_to
        description: "Entity is semantically similar to another"
        inverse: similar_to
        symmetric: true
      - name: part_of
        description: "Entity is part of a larger entity"
        inverse: has_part
      - name: instance_of
        description: "Entity is an instance of a type"
        inverse: type_of
      - name: treats
        description: "Provider treats a patient"
        inverse: treated_by
      - name: ordered_for
        description: "Medication or procedure ordered for an encounter"
        inverse: has_order

  metrics:
    auto_discover: false
    definitions: []

  validation:
    min_entity_confidence: 0.5
    max_entities_per_table: 3
    ai_validation_enabled: true
    classification_model: "databricks-claude-sonnet-4-6"


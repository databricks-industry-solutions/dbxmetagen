  source_ontology: FHIR_R4
  uri: http://hl7.org/fhir/StructureDefinition/Medication
  keywords:
  - medication
  - drug
  - prescription
  - pharmacy
  - ndc
  - rxnorm
  typical_attributes:
  - id
  - name
  - ndc
  - dose
  - frequency
  - route
  relationships:
    ordered_for:
      target: Encounter
      cardinality: many-to-one
    prescribed_to:

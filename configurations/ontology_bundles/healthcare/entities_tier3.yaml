  relationships:
    references:
      target: Patient
      cardinality: many-to-one
    recorded_in:
      target: Encounter
      cardinality: many-to-one
Claim:
  description: Insurance claims or billing submissions (FHIR Claim)
  parent: Transaction
  source_ontology: FHIR_R4
  uri: http://hl7.org/fhir/StructureDefinition/Claim
  keywords:
  - claim
  - billing
  - adjudication
  - remittance
  - eob
  typical_attributes:
  - id
  - patient_id
  - amount
  - service_date
  - status
  - payer_id
  relationships:
    references:
      target: Patient
      cardinality: many-to-one
    for_encounter:
      target: Encounter
      cardinality: many-to-one
    covered_by:
      target: Coverage
      cardinality: many-to-one
  properties:
    identifier:
      kind: data_property
      role: primary_key
      typical_attributes:
      - id
      - claim_id
      - claim_number
    patient:
      kind: object_property
      role: object_property
      edge: references
      target_entity: Patient
      typical_attributes:
      - patient_id
      - member_id
      - subscriber_id
    amount:
      kind: data_property
      role: measure
      typical_attributes:
      - amount
      - total_charge
      - billed_amount
      - paid_amount
      - allowed_amount
    service_date:
      kind: data_property
      role: temporal
      typical_attributes:
      - service_date
      - claim_date
      - date_of_service
      - from_date
    status:
      kind: data_property
      role: dimension
      typical_attributes:
      - status
      - claim_status
      - adjudication_status
    encounter:
      kind: object_property
      role: object_property
      edge: for_encounter
      target_entity: Encounter
      typical_attributes:
      - encounter_id
      - visit_id
    payer:
      kind: object_property
      role: object_property
      edge: covered_by
      target_entity: Coverage
      typical_attributes:
      - payer_id
      - plan_id
      - coverage_id
      - insurance_id

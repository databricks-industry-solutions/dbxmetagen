version: "1.0"
default_tag_key: "geo_classification"
default_category: "non_geographic"
categories:
  geographic:
    name: "Geographic"
    description: "Columns that represent a physical location, address, or geographic area suitable for location-based filtering"
    keywords:
      - "address"
      - "addr"
      - "street"
      - "city"
      - "state"
      - "province"
      - "zip"
      - "zipcode"
      - "zip_code"
      - "postal"
      - "postal_code"
      - "country"
      - "county"
      - "region"
      - "latitude"
      - "lat"
      - "longitude"
      - "lon"
      - "lng"
      - "geolocation"
      - "geo"
      - "location"
      - "place"
      - "territory"
      - "district"
      - "fips"
      - "cbsa"
      - "msa"
      - "timezone"
      - "continent"
      - "municipality"
      - "borough"
      - "parish"
      - "ward"
      - "precinct"
  non_geographic:
    name: "Non-Geographic"
    description: "Columns that do not represent a physical location despite potentially ambiguous naming"
    keywords:
      - "memory_location"
      - "file_location"
      - "storage_location"
      - "url"
      - "uri"
      - "path"
      - "endpoint"

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Poetry
        run: |
          python3 -m pip install --user pipx
          python3 -m pipx ensurepath
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          pipx install poetry==2.0.1

      - name: Build Python wheel
        run: poetry build

      - name: Test wheel installation
        run: |
          pip install dist/*.whl
          python -c "from dbxmetagen.config import MetadataConfig; print('Wheel import OK')"

      - name: Build frontend
        working-directory: apps/dbxmetagen-app/app/src
        run: npm install && npm run build

      - name: Package app directory
        run: tar -czf dbxmetagen-app-${{ github.ref_name || 'dev' }}.tar.gz -C apps/dbxmetagen-app app

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dbxmetagen-app-${{ github.ref_name }}.tar.gz
          generate_release_notes: true

      - name: Upload artifacts (for manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*.whl
            dbxmetagen-app-*.tar.gz
          retention-days: 30

name: CI Pipeline

on:
  pull_request:
    branches: [main, master, preview]
  push:
    branches: [main, master, preview]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit checks
        run: pre-commit run --all-files
        continue-on-error: true

  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Load cached venv
        id: cached-uv-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: uv sync --extra ontology

      - name: Run unit tests
        run: |
          uv run pytest tests/ --ignore=tests/test_ddl_regenerator.py --ignore=tests/test_binary_variant_types.py -v --tb=short --durations=10
          uv run pytest tests/test_ddl_regenerator.py -v --tb=short
          uv run pytest tests/test_binary_variant_types.py -v --tb=short

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results - Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ ${{ job.status }} == 'success' ]; then
            echo "All unit tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "Some tests failed" >> $GITHUB_STEP_SUMMARY
          fi

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv sync --extra ontology
          uv pip install pytest-cov

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=src --cov=apps/dbxmetagen-app/app --cov-report=term --cov-report=html
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  build-wheel:
    name: Build & Test Wheel Install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: uv build

      - name: Test wheel installation
        run: |
          pip install dist/*.whl
          python -c "from dbxmetagen.config import MetadataConfig; print('Import successful')"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
          retention-days: 30

  validate-ontology-bundles:
    name: Validate Ontology Bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra ontology

      - name: Tier + bundle checks
        run: uv run python scripts/ci_validate_ontology_bundles.py

  validate-config:
    name: Validate Configuration Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Validate pyproject.toml
        run: uv build --sdist --no-cache 2>/dev/null && echo "pyproject.toml is valid"

      - name: Validate YAML files
        run: |
          pip install pyyaml
          python -c "import yaml, sys; [yaml.safe_load(open(f)) for f in ['databricks.yml', 'variables.yml', 'variables.advanced.yml'] if __import__('os').path.exists(f)]"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-coverage, build-wheel, validate-config, validate-ontology-bundles]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.test-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Wheel | ${{ needs.build-wheel.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Config Validation | ${{ needs.validate-config.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ontology Bundles | ${{ needs.validate-ontology-bundles.result }} |" >> $GITHUB_STEP_SUMMARY
